<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ace Player</title>
  <link rel="icon" type="image/webp" href="https://raw.githubusercontent.com/Ismaeloul/umbrel-app-store/main/ismaeloul-ace-player/icon.webp">
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/Ismaeloul/umbrel-app-store/main/ismaeloul-ace-player/icon.webp">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --line: #dfe6ef;
      --soft: #eef4fb;
      --text: #0f172a;
      --muted: #7b8797;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --green: #10b981;
      --danger: #ef4444;
      --warn: #f59e0b;
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.10);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    button, input { font: inherit; }
    button { cursor: pointer; }

    .app {
      width: min(1520px, 100%);
      margin: 0 auto;
      padding: 24px 16px 44px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 20px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .mark {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: #fff;
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 900;
      overflow: hidden;
      border: 1px solid var(--line);
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.22);
    }
    .mark img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .brand h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1;
      letter-spacing: 0;
    }
    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }
    .status {
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--muted);
      min-height: 40px;
      border-radius: 999px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-size: 13px;
      font-weight: 800;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.04);
    }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--warn);
    }
    .status.online .dot { background: var(--green); }
    .status.offline .dot { background: var(--danger); }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 18px;
      align-items: start;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }
    .player-card {
      overflow: hidden;
    }
    .stage {
      position: relative;
      background: #020617;
      aspect-ratio: 16 / 9;
      min-height: min(76vh, 760px);
    }
    video {
      width: 100%;
      height: 100%;
      display: block;
      background: #020617;
    }
    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      text-align: center;
      background: radial-gradient(circle at center, rgba(37, 99, 235, 0.18), rgba(2, 6, 23, 0.92) 58%);
      color: #cbd5e1;
      pointer-events: none;
    }
    .overlay-box {
      display: grid;
      gap: 12px;
      justify-items: center;
      max-width: 360px;
    }
    .overlay-title {
      color: #fff;
      font-size: 18px;
      font-weight: 900;
    }
    .overlay-text {
      color: #94a3b8;
      font-size: 13px;
      line-height: 1.5;
    }
    .spinner {
      width: 34px;
      height: 34px;
      border: 3px solid rgba(255, 255, 255, 0.18);
      border-top-color: #fff;
      border-radius: 999px;
      animation: spin 0.85s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .controls {
      padding: 16px;
      display: grid;
      gap: 12px;
    }
    .input-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
    }
    .hash-input {
      width: 100%;
      height: 50px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #f8fafc;
      color: var(--text);
      outline: none;
      padding: 0 14px;
      font-size: 14px;
      font-weight: 650;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .hash-input:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.10);
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
    }
    .btn {
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      color: var(--text);
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 850;
      white-space: nowrap;
    }
    .btn.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.20);
    }
    .btn.primary:hover { background: var(--primary-dark); }
    .btn.icon { width: 48px; padding: 0; }
    .message {
      min-height: 18px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }
    .message.error { color: var(--danger); }
    .message.success { color: var(--green); }

    .side {
      display: grid;
      gap: 14px;
    }
    .panel {
      padding: 14px;
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    .panel-title {
      margin: 0;
      font-size: 15px;
      font-weight: 900;
    }
    .subtle {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 4px 0;
      font-size: 12px;
      font-weight: 800;
    }
    .list {
      display: grid;
      gap: 8px;
      max-height: 330px;
      overflow: auto;
    }
    .empty {
      border: 1px dashed var(--line);
      border-radius: 18px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
      text-align: center;
      padding: 22px 12px;
      background: #f8fafc;
    }
    .item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: center;
      padding: 10px;
      border: 1px solid #edf2f7;
      border-radius: 16px;
      background: #f8fafc;
    }
    .item-main {
      min-width: 0;
      border: 0;
      background: transparent;
      color: inherit;
      text-align: left;
      padding: 0;
    }
    .item-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 900;
    }
    .item-hash {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 11px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      margin-top: 4px;
    }
    .mini {
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--muted);
      font-weight: 900;
    }
    .mini:hover { color: var(--danger); }
    .mini.star:hover { color: var(--warn); }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(15, 23, 42, 0.48);
      backdrop-filter: blur(6px);
      z-index: 10;
    }
    .modal {
      width: min(420px, 100%);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 20px;
    }
    .modal h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }
    .modal input {
      width: 100%;
      height: 48px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #f8fafc;
      color: var(--text);
      outline: none;
      padding: 0 14px;
      margin-bottom: 14px;
      font-weight: 700;
    }
    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .topbar { align-items: flex-start; }
      .brand h1 { font-size: 23px; }
    }
    @media (max-width: 560px) {
      .app { padding: 16px 12px 32px; }
      .input-row, .actions { grid-template-columns: 1fr; }
      .actions .btn.icon { width: 100%; }
      .status { max-width: 155px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark"><img src="https://raw.githubusercontent.com/Ismaeloul/umbrel-app-store/main/ismaeloul-ace-player/icon.webp" alt=""></div>
        <div>
          <h1>Ace Player</h1>
          <p>Reproductor AceStream para Umbrel</p>
        </div>
      </div>
      <button class="status" id="statusButton" type="button">
        <span class="dot"></span>
        <span id="statusText">Conectando...</span>
      </button>
    </header>

    <div class="grid">
      <section class="card player-card">
        <div class="stage">
          <video id="player" playsinline controls></video>
          <div class="overlay" id="overlay">
            <div class="overlay-box">
              <div id="overlayIcon" class="overlay-title">ACE</div>
              <div id="overlayText" class="overlay-text">Pega un enlace acestream:// o un hash para comenzar.</div>
            </div>
          </div>
        </div>
        <div class="controls">
          <div class="input-row">
            <input class="hash-input" id="hashInput" type="text" autocomplete="off" spellcheck="false" placeholder="acestream://... o hash">
            <button class="btn primary" id="playBtn" type="button">Reproducir</button>
          </div>
          <div class="actions">
            <button class="btn" id="liveBtn" type="button">Directo</button>
            <button class="btn icon" id="saveBtn" type="button" title="Guardar favorito">+</button>
            <button class="btn icon" id="stopBtn" type="button" title="Detener">×</button>
          </div>
          <div class="message" id="message"></div>
        </div>
      </section>

      <aside class="side">
        <section class="card panel">
          <div class="panel-head">
            <h2 class="panel-title">Favoritos</h2>
          </div>
          <div class="list" id="favList"></div>
        </section>

        <section class="card panel">
          <div class="panel-head">
            <h2 class="panel-title">Recientes</h2>
            <button class="subtle" id="clearHistoryBtn" type="button">Limpiar</button>
          </div>
          <div class="list" id="histList"></div>
        </section>
      </aside>
    </div>
  </main>

  <div class="modal-backdrop" id="favModal">
    <div class="modal">
      <h2>Guardar favorito</h2>
      <input id="favNameInput" placeholder="Nombre del canal">
      <div class="modal-actions">
        <button class="btn" id="cancelFavBtn" type="button">Cancelar</button>
        <button class="btn primary" id="confirmFavBtn" type="button">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    const SERVER = "";
    const HASH_RE = /^[a-fA-F0-9]{40}$/;
    const MAX_HIST = 30;
    const player = document.getElementById("player");
    const overlay = document.getElementById("overlay");
    const overlayText = document.getElementById("overlayText");
    const overlayIcon = document.getElementById("overlayIcon");
    const hashInput = document.getElementById("hashInput");
    const message = document.getElementById("message");
    const statusButton = document.getElementById("statusButton");
    const statusText = document.getElementById("statusText");
    const favList = document.getElementById("favList");
    const histList = document.getElementById("histList");
    const favModal = document.getElementById("favModal");
    const favNameInput = document.getElementById("favNameInput");

    let hls = null;
    let currentHash = null;
    let state = { favorites: [], history: [] };
    let storageMode = "server";
    let retryCount = 0;

    function sanitizeHash(value) {
      return String(value || "")
        .trim()
        .replace(/^acestream:\/\//i, "")
        .replace(/^.*[?&]id=/i, "")
        .trim();
    }

    function setOverlay(title, text = "", loading = false) {
      overlay.style.display = "grid";
      overlayIcon.innerHTML = loading ? '<div class="spinner"></div>' : title;
      overlayText.textContent = text || title;
    }

    function hideOverlay() {
      overlay.style.display = "none";
    }

    function setMessage(text, type = "") {
      message.textContent = text;
      message.className = `message ${type}`;
    }

    function localState() {
      return {
        favorites: JSON.parse(localStorage.getItem("ace_favs") || "[]"),
        history: JSON.parse(localStorage.getItem("ace_hist") || "[]"),
      };
    }

    function writeLocal(next) {
      localStorage.setItem("ace_favs", JSON.stringify(next.favorites || []));
      localStorage.setItem("ace_hist", JSON.stringify(next.history || []));
    }

    async function apiState(method = "GET", payload) {
      const options = { method, headers: { "Content-Type": "application/json" } };
      if (payload) options.body = JSON.stringify(payload);
      const response = await fetch(`${SERVER}/api/state`, options);
      if (!response.ok) throw new Error("state api failed");
      return response.json();
    }

    async function loadState() {
      try {
        state = await apiState();
        storageMode = "server";
        const legacy = localState();
        if (!state.favorites.length && legacy.favorites.length) {
          state.favorites = legacy.favorites;
          await saveState(false);
        }
      } catch {
        storageMode = "local";
        state = localState();
      }
      renderAll();
    }

    async function saveState(render = true) {
      state.history = state.history.slice(0, MAX_HIST);
      if (storageMode === "server") {
        try {
          state = await apiState("PUT", state);
        } catch {
          storageMode = "local";
          writeLocal(state);
        }
      } else {
        writeLocal(state);
      }
      if (render) renderAll();
    }

    async function addHistory(hash) {
      state.history = state.history.filter((item) => item.hash !== hash);
      state.history.unshift({ hash, name: `Canal ${hash.slice(0, 8)}`, date: new Date().toISOString() });
      await saveState();
    }

    async function testConnection() {
      statusButton.className = "status";
      statusText.textContent = "Conectando...";
      try {
        const response = await fetch(`${SERVER}/webui/api/service?method=get_version`, { signal: AbortSignal.timeout(4500) });
        if (!response.ok) throw new Error("engine offline");
        statusButton.className = "status online";
        statusText.textContent = "Engine activo";
      } catch {
        statusButton.className = "status offline";
        statusText.textContent = "Sin conexion";
      }
    }

    function destroyPlayer() {
      if (hls) {
        hls.destroy();
        hls = null;
      }
      player.pause();
      player.removeAttribute("src");
      player.load();
    }

    function seekLiveEdge() {
      if (hls && hls.liveSyncPosition) {
        player.currentTime = hls.liveSyncPosition;
      } else if (player.seekable && player.seekable.length) {
        player.currentTime = player.seekable.end(player.seekable.length - 1);
      }
      player.play().catch(() => setMessage("Pulsa play en el video.", ""));
    }

    async function requestPictureInPicture() {
      if (!currentHash || player.paused || player.readyState < 2) return;
      if (!document.pictureInPictureEnabled || player.disablePictureInPicture) return;
      if (document.pictureInPictureElement) return;
      try {
        await player.requestPictureInPicture();
      } catch {
        // Algunos navegadores moviles solo permiten PiP con gesto directo del usuario.
      }
    }

    function manifestUrl(hash) {
      return `${SERVER}/ace/manifest.m3u8?id=${hash}&_=${Date.now()}`;
    }

    async function startPlayback(value) {
      const hash = sanitizeHash(value || hashInput.value);
      if (!HASH_RE.test(hash)) {
        setMessage("Hash invalido: debe tener 40 caracteres hexadecimales.", "error");
        return;
      }

      currentHash = hash;
      hashInput.value = hash;
      retryCount = 0;
      await addHistory(hash);
      destroyPlayer();
      setMessage("");
      setOverlay("Conectando", "Preparando AceStream...", true);

      const url = manifestUrl(hash);
      if (window.Hls && Hls.isSupported()) {
        hls = new Hls({
          enableWorker: true,
          lowLatencyMode: false,
          liveDurationInfinity: true,
          liveSyncDurationCount: 3,
          liveMaxLatencyDurationCount: 8,
          maxBufferLength: 30,
          maxMaxBufferLength: 60,
          backBufferLength: 30,
          manifestLoadingTimeOut: 18000,
          manifestLoadingMaxRetry: 8,
          levelLoadingTimeOut: 18000,
          fragLoadingTimeOut: 26000,
          fragLoadingMaxRetry: 8,
        });
        hls.loadSource(url);
        hls.attachMedia(player);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          hideOverlay();
          seekLiveEdge();
          setMessage("Stream cargado.", "success");
        });
        hls.on(Hls.Events.ERROR, (_, data) => {
          if (!data.fatal) return;
          if (data.type === Hls.ErrorTypes.NETWORK_ERROR && retryCount < 5) {
            retryCount += 1;
            setOverlay("Reconectando", `Reintento ${retryCount}/5...`, true);
            setTimeout(() => hls && hls.startLoad(), 1200 * retryCount);
            return;
          }
          if (data.type === Hls.ErrorTypes.MEDIA_ERROR && retryCount < 3) {
            retryCount += 1;
            hls.recoverMediaError();
            return;
          }
          setOverlay("No se pudo reproducir", "Prueba de nuevo en unos segundos o revisa el hash.");
          setMessage("Error de reproduccion.", "error");
        });
      } else if (player.canPlayType("application/vnd.apple.mpegurl")) {
        player.src = url;
        hideOverlay();
        player.play().catch(() => setMessage("Pulsa play en el video.", ""));
      } else {
        setOverlay("HLS no soportado", "Este navegador no puede reproducir HLS.");
      }
    }

    function stopPlayback() {
      currentHash = null;
      destroyPlayer();
      setMessage("");
      setOverlay("ACE", "Pega un enlace acestream:// o un hash para comenzar.");
    }

    function renderList(container, items, type) {
      if (!items.length) {
        container.innerHTML = `<div class="empty">${type === "fav" ? "Sin favoritos" : "Sin recientes"}</div>`;
        return;
      }
      container.innerHTML = "";
      items.forEach((item) => {
        const row = document.createElement("div");
        row.className = "item";

        const main = document.createElement("button");
        main.type = "button";
        main.className = "item-main";
        main.onclick = () => startPlayback(item.hash);
        main.innerHTML = '<div class="item-name"></div><div class="item-hash"></div>';
        main.querySelector(".item-name").textContent = item.name || `Canal ${item.hash.slice(0, 8)}`;
        main.querySelector(".item-hash").textContent = item.hash;

        if (type === "hist") {
          const star = document.createElement("button");
          star.type = "button";
          star.className = "mini star";
          star.textContent = "★";
          star.title = "Guardar favorito";
          star.onclick = () => openFavoriteModal(item.hash);
          row.appendChild(star);
        }

        const del = document.createElement("button");
        del.type = "button";
        del.className = "mini";
        del.textContent = "×";
        del.onclick = () => removeItem(type, item.hash);

        row.append(main, del);
        container.appendChild(row);
      });
    }

    function renderAll() {
      renderList(favList, state.favorites, "fav");
      renderList(histList, state.history, "hist");
    }

    function openFavoriteModal(hash) {
      const cleanHash = sanitizeHash(hash || hashInput.value);
      if (!HASH_RE.test(cleanHash)) {
        setMessage("Introduce un hash valido primero.", "error");
        return;
      }
      hashInput.value = cleanHash;
      favNameInput.value = state.favorites.find((item) => item.hash === cleanHash)?.name || "";
      favModal.style.display = "flex";
      setTimeout(() => favNameInput.focus(), 50);
    }

    function closeFavoriteModal() {
      favModal.style.display = "none";
    }

    async function saveFavorite() {
      const hash = sanitizeHash(hashInput.value);
      if (!HASH_RE.test(hash)) return;
      const name = favNameInput.value.trim() || `Canal ${hash.slice(0, 8)}`;
      state.favorites = state.favorites.filter((item) => item.hash !== hash);
      state.favorites.unshift({ hash, name, date: new Date().toISOString() });
      await saveState();
      closeFavoriteModal();
      setMessage("Favorito guardado.", "success");
    }

    async function removeItem(type, hash) {
      if (type === "fav") state.favorites = state.favorites.filter((item) => item.hash !== hash);
      else state.history = state.history.filter((item) => item.hash !== hash);
      await saveState();
    }

    async function clearHistory() {
      state.history = [];
      await saveState();
    }

    document.getElementById("playBtn").onclick = () => startPlayback();
    document.getElementById("saveBtn").onclick = () => openFavoriteModal();
    document.getElementById("liveBtn").onclick = seekLiveEdge;
    document.getElementById("stopBtn").onclick = stopPlayback;
    document.getElementById("clearHistoryBtn").onclick = clearHistory;
    document.getElementById("cancelFavBtn").onclick = closeFavoriteModal;
    document.getElementById("confirmFavBtn").onclick = saveFavorite;
    statusButton.onclick = testConnection;
    hashInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") startPlayback();
    });
    player.addEventListener("waiting", () => {
      if (currentHash) setMessage("Buffering...");
    });
    player.addEventListener("playing", () => {
      if (currentHash) setMessage("Reproduciendo.", "success");
    });
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) requestPictureInPicture();
    });
    favModal.addEventListener("click", (event) => {
      if (event.target === favModal) closeFavoriteModal();
    });

    setOverlay("ACE", "Pega un enlace acestream:// o un hash para comenzar.");
    loadState();
    testConnection();
  </script>
</body>
</html>
