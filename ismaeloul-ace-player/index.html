<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ace Player</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
  <style>
    :root {
      --bg: #0b0d10;
      --panel: #14181d;
      --panel-soft: #1b2027;
      --line: #2a313a;
      --text: #eef3f8;
      --muted: #8a96a3;
      --accent: #2f9bff;
      --accent-2: #20c997;
      --danger: #ff5c77;
      --warn: #ffca5f;
      --ok: #43d17d;
      --shadow: 0 18px 55px rgba(0, 0, 0, 0.34);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    button, input { font: inherit; }
    button { cursor: pointer; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .topbar {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(20, 24, 29, 0.95);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .mark {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 28px rgba(47, 155, 255, 0.25);
    }
    .brand-title {
      font-size: 16px;
      font-weight: 760;
      letter-spacing: 0;
      white-space: nowrap;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-soft);
      color: var(--muted);
      font-size: 13px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--warn);
    }
    .status.online .status-dot { background: var(--ok); }
    .status.offline .status-dot { background: var(--danger); }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 20px;
      width: min(1480px, 100%);
      margin: 0 auto;
      padding: 20px;
    }
    .player-column {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .stage {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #000;
      box-shadow: var(--shadow);
      aspect-ratio: 16 / 9;
    }
    video {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
    }
    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at center, rgba(47, 155, 255, 0.10), rgba(0, 0, 0, 0.88) 58%);
      color: var(--muted);
      text-align: center;
      padding: 24px;
      pointer-events: none;
    }
    .overlay-content {
      display: grid;
      gap: 12px;
      justify-items: center;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255, 255, 255, 0.16);
      border-top-color: var(--accent);
      border-radius: 999px;
      animation: spin 0.85s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .control-strip {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto auto;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    .hash-input {
      width: 100%;
      height: 42px;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      outline: none;
      background: #0f1216;
      color: var(--text);
      padding: 0 13px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
    }
    .hash-input:focus { border-color: var(--accent); }
    .button {
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-soft);
      color: var(--text);
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
    }
    .button.primary {
      border-color: transparent;
      background: var(--accent);
      color: #06111f;
      font-weight: 760;
    }
    .button.icon { width: 42px; padding: 0; }
    .button:hover { filter: brightness(1.08); }

    .message {
      min-height: 18px;
      color: var(--muted);
      font-size: 13px;
      padding: 0 2px;
    }
    .message.error { color: var(--danger); }
    .message.success { color: var(--ok); }

    .side {
      min-width: 0;
      display: grid;
      gap: 14px;
      align-content: start;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
    }
    .panel-title {
      font-size: 13px;
      font-weight: 760;
      color: var(--text);
    }
    .text-button {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 4px 0;
      font-size: 12px;
    }
    .text-button:hover { color: var(--text); }
    .list {
      max-height: 284px;
      overflow: auto;
      padding: 8px;
    }
    .empty {
      color: var(--muted);
      font-size: 13px;
      padding: 18px 8px;
      text-align: center;
    }
    .item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 9px;
      border-radius: 8px;
    }
    .item:hover { background: var(--panel-soft); }
    .item-main {
      min-width: 0;
      border: 0;
      background: transparent;
      color: inherit;
      text-align: left;
      padding: 0;
    }
    .item-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 680;
    }
    .item-hash {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      margin-top: 3px;
    }
    .item-actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .mini {
      width: 30px;
      height: 30px;
      border: 0;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
    }
    .mini:hover { background: #242b34; color: var(--text); }
    .mini.danger:hover { color: var(--danger); }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.68);
      z-index: 10;
    }
    .modal {
      width: min(420px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 18px;
    }
    .modal h2 {
      margin: 0 0 14px;
      font-size: 17px;
    }
    .modal input {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0f1216;
      color: var(--text);
      outline: none;
      padding: 0 12px;
      margin-bottom: 14px;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; padding: 14px; }
      .topbar { padding: 0 14px; }
      .control-strip { grid-template-columns: 1fr auto; }
      .control-strip .button.primary { grid-column: span 2; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark"></div>
        <div class="brand-title">Ace Player</div>
      </div>
      <button class="status" id="statusButton" type="button">
        <span class="status-dot"></span>
        <span id="statusText">Conectando...</span>
      </button>
    </header>

    <main class="layout">
      <section class="player-column">
        <div class="stage">
          <video id="player" playsinline controls></video>
          <div class="overlay" id="overlay">
            <div class="overlay-content">
              <div id="overlayIcon">ACE</div>
              <div id="overlayText">Introduce un hash para comenzar</div>
            </div>
          </div>
        </div>

        <div class="control-strip">
          <input class="hash-input" id="hashInput" type="text" autocomplete="off" spellcheck="false" placeholder="hash o acestream://...">
          <button class="button icon" id="liveBtn" type="button" title="Volver al directo">LIVE</button>
          <button class="button icon" id="saveBtn" type="button" title="Guardar favorito">+</button>
          <button class="button primary" id="playBtn" type="button">Conectar</button>
        </div>
        <div class="message" id="message"></div>
      </section>

      <aside class="side">
        <section class="panel">
          <div class="panel-head">
            <div class="panel-title">Favoritos</div>
          </div>
          <div class="list" id="favList"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <div class="panel-title">Historial</div>
            <button class="text-button" id="clearHistoryBtn" type="button">Limpiar</button>
          </div>
          <div class="list" id="histList"></div>
        </section>
      </aside>
    </main>
  </div>

  <div class="modal-backdrop" id="favModal">
    <div class="modal">
      <h2>Guardar favorito</h2>
      <input id="favNameInput" placeholder="Nombre">
      <div class="modal-actions">
        <button class="button" id="cancelFavBtn" type="button">Cancelar</button>
        <button class="button primary" id="confirmFavBtn" type="button">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    const SERVER = "";
    const HASH_RE = /^[a-fA-F0-9]{40}$/;
    const MAX_HIST = 50;
    const player = document.getElementById("player");
    const overlay = document.getElementById("overlay");
    const overlayText = document.getElementById("overlayText");
    const overlayIcon = document.getElementById("overlayIcon");
    const hashInput = document.getElementById("hashInput");
    const message = document.getElementById("message");
    const statusButton = document.getElementById("statusButton");
    const statusText = document.getElementById("statusText");
    const favList = document.getElementById("favList");
    const histList = document.getElementById("histList");
    const favModal = document.getElementById("favModal");
    const favNameInput = document.getElementById("favNameInput");

    let hls = null;
    let currentHash = null;
    let state = { favorites: [], history: [] };
    let storageMode = "server";
    let overlayVisible = true;

    function sanitizeHash(value) {
      return String(value || "").trim().replace(/^acestream:\/\//i, "");
    }

    function setOverlay(text, loading = false) {
      overlayVisible = true;
      overlay.style.display = "grid";
      overlayIcon.innerHTML = loading ? '<div class="spinner"></div>' : "ACE";
      overlayText.textContent = text;
    }

    function hideOverlay() {
      overlayVisible = false;
      overlay.style.display = "none";
    }

    function setMessage(text, type = "") {
      message.textContent = text;
      message.className = `message ${type}`;
    }

    function localState() {
      return {
        favorites: JSON.parse(localStorage.getItem("ace_favs") || "[]"),
        history: JSON.parse(localStorage.getItem("ace_hist") || "[]"),
      };
    }

    function writeLocal(next) {
      localStorage.setItem("ace_favs", JSON.stringify(next.favorites || []));
      localStorage.setItem("ace_hist", JSON.stringify(next.history || []));
    }

    async function apiState(method = "GET", payload) {
      const options = { method, headers: { "Content-Type": "application/json" } };
      if (payload) options.body = JSON.stringify(payload);
      const response = await fetch(`${SERVER}/api/state`, options);
      if (!response.ok) throw new Error("state api failed");
      return response.json();
    }

    async function loadState() {
      try {
        state = await apiState();
        storageMode = "server";
        const legacy = localState();
        if (!state.favorites.length && legacy.favorites.length) {
          state.favorites = legacy.favorites;
          await saveState(false);
        }
      } catch {
        storageMode = "local";
        state = localState();
      }
      renderAll();
    }

    async function saveState(render = true) {
      state.history = state.history.slice(0, MAX_HIST);
      if (storageMode === "server") {
        try {
          state = await apiState("PUT", state);
        } catch {
          storageMode = "local";
          writeLocal(state);
        }
      } else {
        writeLocal(state);
      }
      if (render) renderAll();
    }

    function addHistory(hash) {
      state.history = state.history.filter((item) => item.hash !== hash);
      state.history.unshift({ hash, name: `Canal ${hash.slice(0, 8)}`, date: new Date().toISOString() });
      return saveState();
    }

    async function testConnection() {
      statusButton.className = "status";
      statusText.textContent = "Conectando...";
      try {
        const response = await fetch(`${SERVER}/webui/api/service?method=get_version`, { signal: AbortSignal.timeout(4000) });
        if (!response.ok) throw new Error("engine offline");
        statusButton.className = "status online";
        statusText.textContent = "Engine activo";
      } catch {
        statusButton.className = "status offline";
        statusText.textContent = "Sin conexion";
      }
    }

    function destroyPlayer() {
      if (hls) {
        hls.destroy();
        hls = null;
      }
      player.removeAttribute("src");
      player.load();
    }

    function seekLiveEdge() {
      if (hls && hls.liveSyncPosition) {
        player.currentTime = hls.liveSyncPosition;
      } else if (player.seekable && player.seekable.length) {
        player.currentTime = player.seekable.end(player.seekable.length - 1);
      }
      player.play().catch(() => setMessage("Pulsa reproducir en el video", ""));
    }

    function keepNearLive() {
      if (!player.seekable || !player.seekable.length || player.paused) return;
      const liveEdge = player.seekable.end(player.seekable.length - 1);
      const latency = liveEdge - player.currentTime;
      if (latency > 30) seekLiveEdge();
    }

    async function startPlayback(value) {
      const hash = sanitizeHash(value || hashInput.value);
      if (!HASH_RE.test(hash)) {
        setMessage("Hash invalido: debe tener 40 caracteres hexadecimales.", "error");
        return;
      }

      currentHash = hash;
      hashInput.value = hash;
      await addHistory(hash);
      destroyPlayer();
      setMessage("");
      setOverlay("Cargando stream...", true);

      const url = `${SERVER}/ace/manifest.m3u8?id=${hash}`;
      if (Hls.isSupported()) {
        hls = new Hls({
          lowLatencyMode: true,
          liveDurationInfinity: true,
          liveSyncDurationCount: 2,
          liveMaxLatencyDurationCount: 5,
          maxLiveSyncPlaybackRate: 1.5,
          maxBufferLength: 12,
          maxMaxBufferLength: 24,
          manifestLoadingTimeOut: 14000,
          manifestLoadingMaxRetry: 5,
          fragLoadingTimeOut: 22000,
          fragLoadingMaxRetry: 8,
        });
        hls.loadSource(url);
        hls.attachMedia(player);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          hideOverlay();
          seekLiveEdge();
        });
        hls.on(Hls.Events.ERROR, (_, data) => {
          if (!data.fatal) return;
          if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
            hls.startLoad();
            return;
          }
          if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
            hls.recoverMediaError();
            return;
          }
          setOverlay("Error de reproduccion");
        });
      } else if (player.canPlayType("application/vnd.apple.mpegurl")) {
        player.src = url;
        hideOverlay();
        player.play().catch(() => setMessage("Pulsa reproducir en el video", ""));
      } else {
        setOverlay("HLS no esta soportado en este navegador");
      }
    }

    function renderList(container, items, type) {
      if (!items.length) {
        container.innerHTML = `<div class="empty">${type === "fav" ? "Sin favoritos" : "Sin historial"}</div>`;
        return;
      }
      container.innerHTML = "";
      items.forEach((item) => {
        const row = document.createElement("div");
        row.className = "item";

        const main = document.createElement("button");
        main.type = "button";
        main.className = "item-main";
        main.onclick = () => startPlayback(item.hash);
        main.innerHTML = `<div class="item-name"></div><div class="item-hash"></div>`;
        main.querySelector(".item-name").textContent = item.name || `Canal ${item.hash.slice(0, 8)}`;
        main.querySelector(".item-hash").textContent = item.hash;

        const actions = document.createElement("div");
        actions.className = "item-actions";
        const play = document.createElement("button");
        play.type = "button";
        play.className = "mini";
        play.textContent = ">";
        play.onclick = () => startPlayback(item.hash);
        actions.appendChild(play);

        if (type === "hist") {
          const star = document.createElement("button");
          star.type = "button";
          star.className = "mini";
          star.textContent = "+";
          star.onclick = () => openFavoriteModal(item.hash);
          actions.appendChild(star);
        }

        const del = document.createElement("button");
        del.type = "button";
        del.className = "mini danger";
        del.textContent = "x";
        del.onclick = () => removeItem(type, item.hash);
        actions.appendChild(del);

        row.append(main, actions);
        container.appendChild(row);
      });
    }

    function renderAll() {
      renderList(favList, state.favorites, "fav");
      renderList(histList, state.history, "hist");
    }

    function openFavoriteModal(hash) {
      const cleanHash = sanitizeHash(hash || hashInput.value);
      if (!HASH_RE.test(cleanHash)) {
        setMessage("Introduce un hash valido primero.", "error");
        return;
      }
      hashInput.value = cleanHash;
      favNameInput.value = state.favorites.find((item) => item.hash === cleanHash)?.name || "";
      favModal.style.display = "flex";
      setTimeout(() => favNameInput.focus(), 50);
    }

    function closeFavoriteModal() {
      favModal.style.display = "none";
    }

    async function saveFavorite() {
      const hash = sanitizeHash(hashInput.value);
      if (!HASH_RE.test(hash)) return;
      const name = favNameInput.value.trim() || `Canal ${hash.slice(0, 8)}`;
      state.favorites = state.favorites.filter((item) => item.hash !== hash);
      state.favorites.unshift({ hash, name, date: new Date().toISOString() });
      await saveState();
      closeFavoriteModal();
      setMessage("Favorito guardado en Umbrel.", "success");
    }

    async function removeItem(type, hash) {
      if (type === "fav") state.favorites = state.favorites.filter((item) => item.hash !== hash);
      else state.history = state.history.filter((item) => item.hash !== hash);
      await saveState();
    }

    async function clearHistory() {
      state.history = [];
      await saveState();
    }

    document.getElementById("playBtn").onclick = () => startPlayback();
    document.getElementById("saveBtn").onclick = () => openFavoriteModal();
    document.getElementById("liveBtn").onclick = seekLiveEdge;
    document.getElementById("clearHistoryBtn").onclick = clearHistory;
    document.getElementById("cancelFavBtn").onclick = closeFavoriteModal;
    document.getElementById("confirmFavBtn").onclick = saveFavorite;
    statusButton.onclick = testConnection;
    hashInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") startPlayback();
    });
    player.addEventListener("play", () => {
      if (!overlayVisible) seekLiveEdge();
    });
    player.addEventListener("pause", () => {
      setTimeout(() => {
        if (currentHash && !player.ended && document.visibilityState === "visible") player.play().catch(() => {});
      }, 1500);
    });
    player.addEventListener("waiting", keepNearLive);
    player.addEventListener("timeupdate", keepNearLive);
    favModal.addEventListener("click", (event) => {
      if (event.target === favModal) closeFavoriteModal();
    });

    setOverlay("Introduce un hash para comenzar");
    loadState();
    testConnection();
  </script>
</body>
</html>
