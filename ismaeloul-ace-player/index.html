<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ace Player</title>
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="apple-touch-icon" href="/icon.svg">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.10/dist/hls.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08090b;
      --surface: #111418;
      --surface-2: #171c22;
      --surface-3: #20262e;
      --text: #f7f7f4;
      --muted: #9aa5ae;
      --line: rgba(255, 255, 255, 0.1);
      --green: #2de07f;
      --blue: #5fb4ff;
      --amber: #ffc857;
      --red: #ff5d75;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; background: var(--bg); }
    body {
      margin: 0;
      color: var(--text);
      background: linear-gradient(180deg, #101318 0%, #08090b 48%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    button, input { font: inherit; }
    button {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: .55;
    }

    .app {
      width: min(1120px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: max(14px, env(safe-area-inset-top)) 12px max(24px, env(safe-area-inset-bottom));
    }
    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 12px;
      margin-bottom: 12px;
    }
    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .brand img {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #0b0d10;
    }
    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1;
      letter-spacing: 0;
    }
    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .status {
      min-height: 42px;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--amber);
      box-shadow: 0 0 0 4px rgba(255, 200, 87, .12);
    }
    .status.online { color: #d8ffe9; border-color: rgba(45, 224, 127, .32); }
    .status.online .dot { background: var(--green); box-shadow: 0 0 0 4px rgba(45, 224, 127, .15); }
    .status.offline { color: #ffd6de; border-color: rgba(255, 93, 117, .32); }
    .status.offline .dot { background: var(--red); box-shadow: 0 0 0 4px rgba(255, 93, 117, .15); }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 12px;
    }
    .player-card,
    .panel {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .stage {
      position: relative;
      min-height: 206px;
      aspect-ratio: 16 / 9;
      background: #020304;
    }
    video {
      width: 100%;
      height: 100%;
      display: block;
      background: #020304;
    }
    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 22px;
      text-align: center;
      color: var(--muted);
      background: linear-gradient(180deg, rgba(2, 3, 4, .36), rgba(2, 3, 4, .9));
      pointer-events: none;
    }
    .overlay-inner {
      width: min(340px, 100%);
      display: grid;
      gap: 10px;
      justify-items: center;
    }
    .overlay-title {
      color: #fff;
      font-size: 24px;
      font-weight: 950;
    }
    .overlay-text {
      font-size: 13px;
      line-height: 1.45;
    }
    .spinner {
      width: 34px;
      height: 34px;
      border: 3px solid rgba(255, 255, 255, .18);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .85s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .controls {
      display: grid;
      gap: 10px;
      padding: 12px;
      border-top: 1px solid var(--line);
    }
    .input-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .hash-input {
      width: 100%;
      min-height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface-2);
      color: var(--text);
      outline: none;
      padding: 0 14px;
      font-size: 13px;
      font-weight: 700;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .hash-input:focus {
      border-color: rgba(45, 224, 127, .72);
      box-shadow: 0 0 0 4px rgba(45, 224, 127, .1);
    }
    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .btn {
      min-height: 46px;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface-3);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 12px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }
    .btn.primary {
      border-color: var(--green);
      background: var(--green);
      color: #03130a;
    }
    .btn.blue {
      border-color: rgba(95, 180, 255, .3);
      color: var(--blue);
      background: rgba(95, 180, 255, .1);
    }
    .btn.warning {
      border-color: rgba(255, 200, 87, .32);
      color: var(--amber);
      background: rgba(255, 200, 87, .1);
    }
    .btn.danger {
      border-color: rgba(255, 93, 117, .32);
      color: var(--red);
      background: rgba(255, 93, 117, .1);
    }
    .message {
      min-height: 18px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
    }
    .message.ok { color: var(--green); }
    .message.error { color: var(--red); }

    .side {
      display: grid;
      gap: 12px;
    }
    .panel {
      padding: 12px;
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .panel-title {
      margin: 0;
      font-size: 14px;
      font-weight: 900;
    }
    .link-btn {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 4px 0;
      font-size: 12px;
      font-weight: 850;
    }
    .health {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .metric {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface-2);
      padding: 10px;
    }
    .metric span {
      display: block;
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
    }
    .metric strong {
      display: block;
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }
    .list {
      display: grid;
      gap: 8px;
      max-height: 300px;
      overflow: auto;
    }
    .empty,
    .item {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface-2);
    }
    .empty {
      color: var(--muted);
      padding: 18px 10px;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      border-style: dashed;
    }
    .item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      padding: 10px;
    }
    .item-main {
      min-width: 0;
      border: 0;
      background: transparent;
      color: inherit;
      text-align: left;
      padding: 0;
    }
    .item-name,
    .item-hash {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .item-name {
      font-size: 13px;
      font-weight: 900;
    }
    .item-hash {
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .item-actions {
      display: inline-flex;
      gap: 5px;
    }
    .mini {
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface-3);
      color: var(--muted);
      font-weight: 900;
    }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 16px;
      background: rgba(0, 0, 0, .58);
      z-index: 10;
    }
    .modal {
      width: min(420px, 100%);
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 16px;
    }
    .modal h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }
    .modal input {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface-2);
      color: var(--text);
      outline: none;
      padding: 0 12px;
      margin-bottom: 12px;
      font-weight: 800;
    }
    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    @media (min-width: 720px) {
      .app { padding: 20px 18px 38px; }
      .topbar {
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        margin-bottom: 16px;
      }
      .status { width: auto; min-width: 210px; }
      .input-row { grid-template-columns: minmax(0, 1fr) 150px; }
      .actions { grid-template-columns: repeat(5, minmax(0, 1fr)); }
      .stage { min-height: 0; }
    }
    @media (min-width: 1040px) {
      .layout { grid-template-columns: minmax(0, 1fr) 330px; gap: 14px; }
      .side { gap: 14px; }
      .health { grid-template-columns: 1fr; }
    }
    @media (max-width: 430px) {
      .brand img { width: 38px; height: 38px; }
      h1 { font-size: 20px; }
      .brand p { font-size: 11px; }
      .stage { min-height: 196px; }
      .health { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <img src="/icon.svg" alt="">
        <div>
          <h1>Ace Player</h1>
          <p>AceStream en Umbrel</p>
        </div>
      </div>
      <button class="status" id="statusButton" type="button">
        <span class="dot"></span>
        <span id="statusText">Comprobando motor...</span>
      </button>
    </header>

    <div class="layout">
      <section class="player-card">
        <div class="stage">
          <video id="player" playsinline controls></video>
          <div class="overlay" id="overlay">
            <div class="overlay-inner">
              <div id="overlayIcon" class="overlay-title">Ace</div>
              <div id="overlayText" class="overlay-text">Pega un hash o enlace acestream:// para empezar.</div>
            </div>
          </div>
        </div>

        <div class="controls">
          <div class="input-row">
            <input class="hash-input" id="hashInput" type="text" autocomplete="off" spellcheck="false" placeholder="Hash, acestream://... o URL con ?id=...">
            <button class="btn primary" id="playBtn" type="button">Reproducir</button>
          </div>
          <div class="actions">
            <button class="btn blue" id="liveBtn" type="button">Directo</button>
            <button class="btn" id="saveBtn" type="button">Guardar</button>
            <button class="btn" id="testBtn" type="button">Test</button>
            <button class="btn" id="stopBtn" type="button">Parar</button>
            <button class="btn danger" id="restartBtn" type="button">Reiniciar</button>
          </div>
          <div class="message" id="message"></div>
        </div>
      </section>

      <aside class="side">
        <section class="panel">
          <div class="panel-head">
            <h2 class="panel-title">Diagnostico</h2>
          </div>
          <div class="health">
            <div class="metric"><span>Motor</span><strong id="engineMetric">--</strong></div>
            <div class="metric"><span>Manifest</span><strong id="manifestMetric">--</strong></div>
            <div class="metric"><span>Segmento</span><strong id="segmentMetric">--</strong></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2 class="panel-title">Favoritos</h2>
          </div>
          <div class="list" id="favList"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2 class="panel-title">Recientes</h2>
            <button class="link-btn" id="clearHistoryBtn" type="button">Limpiar</button>
          </div>
          <div class="list" id="histList"></div>
        </section>
      </aside>
    </div>
  </main>

  <div class="modal-backdrop" id="favModal">
    <div class="modal">
      <h2>Guardar favorito</h2>
      <input id="favNameInput" placeholder="Nombre del canal">
      <div class="modal-actions">
        <button class="btn" id="cancelFavBtn" type="button">Cancelar</button>
        <button class="btn primary" id="confirmFavBtn" type="button">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    const SERVER = "";
    const HASH_RE = /^[a-fA-F0-9]{40}$/;
    const MAX_HIST = 40;

    const player = document.getElementById("player");
    const overlay = document.getElementById("overlay");
    const overlayIcon = document.getElementById("overlayIcon");
    const overlayText = document.getElementById("overlayText");
    const hashInput = document.getElementById("hashInput");
    const message = document.getElementById("message");
    const statusButton = document.getElementById("statusButton");
    const statusText = document.getElementById("statusText");
    const engineMetric = document.getElementById("engineMetric");
    const manifestMetric = document.getElementById("manifestMetric");
    const segmentMetric = document.getElementById("segmentMetric");
    const favList = document.getElementById("favList");
    const histList = document.getElementById("histList");
    const favModal = document.getElementById("favModal");
    const favNameInput = document.getElementById("favNameInput");

    let hls = null;
    let currentHash = null;
    let favoriteModalHash = null;
    let state = { favorites: [], history: [] };
    let retryCount = 0;

    function sanitizeHash(value) {
      const raw = String(value || "").trim();
      let decoded = raw;
      try { decoded = decodeURIComponent(raw); } catch {}
      return (
        decoded.match(/[?&](?:id|content_id|hash)=([a-fA-F0-9]{40})/)?.[1] ||
        decoded.match(/acestream:\/\/([a-fA-F0-9]{40})/i)?.[1] ||
        decoded.match(/[a-fA-F0-9]{40}/)?.[0] ||
        ""
      ).trim();
    }

    function manifestUrl(hash) {
      return `${SERVER}/ace/manifest.m3u8?id=${hash}&_=${Date.now()}`;
    }

    function setOverlay(title, text = "", loading = false) {
      overlay.style.display = "grid";
      overlayIcon.innerHTML = loading ? '<div class="spinner"></div>' : title;
      overlayText.textContent = text || title;
    }

    function hideOverlay() {
      overlay.style.display = "none";
    }

    function setMessage(text, type = "") {
      message.textContent = text;
      message.className = `message ${type}`;
    }

    async function apiState(method = "GET", payload) {
      const options = { method, headers: { "Content-Type": "application/json" } };
      if (payload) options.body = JSON.stringify(payload);
      const response = await fetch(`${SERVER}/api/state`, options);
      if (!response.ok) throw new Error("state api failed");
      return response.json();
    }

    async function loadState() {
      try {
        state = await apiState();
      } catch {
        state = {
          favorites: JSON.parse(localStorage.getItem("ace_favs") || "[]"),
          history: JSON.parse(localStorage.getItem("ace_hist") || "[]"),
        };
      }
      renderAll();
    }

    async function saveState() {
      state.history = state.history.slice(0, MAX_HIST);
      try {
        state = await apiState("PUT", state);
      } catch {
        localStorage.setItem("ace_favs", JSON.stringify(state.favorites));
        localStorage.setItem("ace_hist", JSON.stringify(state.history));
      }
      renderAll();
    }

    function favoriteForHash(hash) {
      return state.favorites.find((item) => item.hash === hash);
    }

    function displayNameForHash(hash, fallbackName) {
      return favoriteForHash(hash)?.name || fallbackName || `Canal ${hash.slice(0, 8)}`;
    }

    async function addHistory(hash) {
      const playedAt = new Date().toISOString();
      state.history = state.history.filter((item) => item.hash !== hash);
      state.history.unshift({ hash, name: displayNameForHash(hash), date: playedAt });
      await saveState();
    }

    async function testConnection() {
      statusButton.className = "status";
      statusText.textContent = "Comprobando motor...";
      engineMetric.textContent = "--";
      try {
        const response = await fetch(`${SERVER}/webui/api/service?method=get_version`, { signal: AbortSignal.timeout(5000) });
        if (!response.ok) throw new Error("offline");
        const data = await response.json();
        const version = data?.result?.version || "activo";
        statusButton.className = "status online";
        statusText.textContent = `Motor ${version}`;
        engineMetric.textContent = version;
        return true;
      } catch {
        statusButton.className = "status offline";
        statusText.textContent = "Motor sin respuesta";
        engineMetric.textContent = "offline";
        return false;
      }
    }

    async function testStream(value) {
      const hash = sanitizeHash(value || hashInput.value || currentHash);
      if (!HASH_RE.test(hash)) {
        setMessage("Introduce un hash valido para probar.", "error");
        return false;
      }

      manifestMetric.textContent = "probando";
      segmentMetric.textContent = "--";
      setMessage("Probando manifest HLS...");
      try {
        const response = await fetch(manifestUrl(hash), { cache: "no-store", signal: AbortSignal.timeout(18000) });
        const text = await response.text();
        if (!response.ok || !text.includes("#EXTM3U")) throw new Error("manifest");
        manifestMetric.textContent = "OK";
        const segment = text.split("\n").map((line) => line.trim()).find((line) => line && !line.startsWith("#"));
        if (!segment) {
          segmentMetric.textContent = "sin segmento";
          setMessage("Manifest OK, esperando segmentos.", "ok");
          return true;
        }
        const segmentUrl = segment.startsWith("http") ? segment : new URL(segment, window.location.origin).toString();
        const segResponse = await fetch(segmentUrl, { cache: "no-store", signal: AbortSignal.timeout(18000) });
        if (!segResponse.ok) throw new Error("segment");
        await segResponse.body?.cancel?.();
        segmentMetric.textContent = "OK";
        setMessage("Manifest y segmento OK.", "ok");
        return true;
      } catch {
        if (manifestMetric.textContent !== "OK") manifestMetric.textContent = "error";
        else segmentMetric.textContent = "error";
        setMessage("El test del stream fallo.", "error");
        return false;
      }
    }

    function destroyPlayer() {
      if (hls) {
        hls.destroy();
        hls = null;
      }
      player.pause();
      player.removeAttribute("src");
      player.load();
    }

    function seekLiveEdge() {
      if (hls?.liveSyncPosition) {
        player.currentTime = hls.liveSyncPosition;
      } else if (player.seekable?.length) {
        player.currentTime = Math.max(player.seekable.end(player.seekable.length - 1) - 3, 0);
      }
      player.play().catch(() => setMessage("Pulsa play en el video.", ""));
    }

    async function startPlayback(value) {
      const hash = sanitizeHash(value || hashInput.value);
      if (!HASH_RE.test(hash)) {
        setMessage("Hash invalido: debe tener 40 caracteres hexadecimales.", "error");
        return;
      }

      currentHash = hash;
      hashInput.value = hash;
      retryCount = 0;
      await addHistory(hash);
      destroyPlayer();
      setMessage("");
      setOverlay("Conectando", "Preparando AceStream...", true);

      const url = manifestUrl(hash);
      if (window.Hls && Hls.isSupported()) {
        hls = new Hls({
          enableWorker: true,
          lowLatencyMode: false,
          liveDurationInfinity: true,
          liveSyncDuration: 18,
          liveMaxLatencyDuration: 60,
          maxBufferLength: 75,
          backBufferLength: 30,
          manifestLoadingTimeOut: 30000,
          manifestLoadingMaxRetry: 8,
          levelLoadingTimeOut: 30000,
          fragLoadingTimeOut: 45000,
          fragLoadingMaxRetry: 8,
        });
        hls.loadSource(url);
        hls.attachMedia(player);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          hideOverlay();
          manifestMetric.textContent = "OK";
          player.play().catch(() => setMessage("Pulsa play en el video.", ""));
          setMessage("Stream cargado.", "ok");
        });
        hls.on(Hls.Events.FRAG_LOADED, () => {
          segmentMetric.textContent = "OK";
        });
        hls.on(Hls.Events.ERROR, (_, data) => {
          if (!data.fatal) return;
          if (data.type === Hls.ErrorTypes.NETWORK_ERROR && retryCount < 6) {
            retryCount += 1;
            setOverlay("Reconectando", `Reintento ${retryCount}/6...`, true);
            setTimeout(() => hls && hls.startLoad(), Math.min(1400 * retryCount, 7000));
            return;
          }
          if (data.type === Hls.ErrorTypes.MEDIA_ERROR && retryCount < 3) {
            retryCount += 1;
            hls.recoverMediaError();
            return;
          }
          setOverlay("No se pudo reproducir", "Usa Test para ver si falla manifest o segmento.");
          setMessage("Error de reproduccion.", "error");
        });
      } else if (player.canPlayType("application/vnd.apple.mpegurl")) {
        player.src = url;
        hideOverlay();
        player.play().catch(() => setMessage("Pulsa play en el video.", ""));
      } else {
        setOverlay("HLS no soportado", "Este navegador no puede reproducir HLS.");
      }
    }

    function stopPlayback() {
      currentHash = null;
      destroyPlayer();
      setMessage("");
      setOverlay("Ace", "Pega un hash o enlace acestream:// para empezar.");
    }

    async function restartEngine() {
      document.getElementById("restartBtn").disabled = true;
      stopPlayback();
      setOverlay("Reiniciando", "Esperando al motor AceStream...", true);
      setMessage("Reiniciando motor...");
      try {
        const response = await fetch(`${SERVER}/api/restart-engine`, {
          method: "POST",
          headers: { "X-Ace-Action": "restart-engine" },
        });
        if (!response.ok) throw new Error("restart");
        setTimeout(testConnection, 4000);
        setMessage("Motor reiniciado.", "ok");
      } catch {
        setMessage("No se pudo reiniciar el motor.", "error");
      } finally {
        setTimeout(() => { document.getElementById("restartBtn").disabled = false; }, 3000);
      }
    }

    function renderList(container, items, type) {
      if (!items.length) {
        container.innerHTML = `<div class="empty">${type === "fav" ? "Sin favoritos" : "Sin recientes"}</div>`;
        return;
      }
      container.innerHTML = "";
      items.forEach((item) => {
        const row = document.createElement("div");
        row.className = "item";

        const main = document.createElement("button");
        main.type = "button";
        main.className = "item-main";
        main.onclick = () => startPlayback(item.hash);
        main.innerHTML = '<div class="item-name"></div><div class="item-hash"></div>';
        main.querySelector(".item-name").textContent = displayNameForHash(item.hash, item.name);
        main.querySelector(".item-hash").textContent = item.hash;

        const actions = document.createElement("div");
        actions.className = "item-actions";

        const save = document.createElement("button");
        save.type = "button";
        save.className = "mini";
        save.textContent = type === "fav" ? "E" : "+";
        save.title = type === "fav" ? "Renombrar" : "Guardar favorito";
        save.onclick = () => openFavoriteModal(item.hash);
        actions.appendChild(save);

        const del = document.createElement("button");
        del.type = "button";
        del.className = "mini";
        del.textContent = "x";
        del.title = "Eliminar";
        del.onclick = () => removeItem(type, item.hash);
        actions.appendChild(del);

        row.append(main, actions);
        container.appendChild(row);
      });
    }

    function renderAll() {
      renderList(favList, state.favorites, "fav");
      renderList(histList, state.history, "hist");
    }

    function openFavoriteModal(hash) {
      const cleanHash = sanitizeHash(hash || hashInput.value);
      if (!HASH_RE.test(cleanHash)) {
        setMessage("Introduce un hash valido primero.", "error");
        return;
      }
      favoriteModalHash = cleanHash;
      hashInput.value = cleanHash;
      favNameInput.value = state.favorites.find((item) => item.hash === cleanHash)?.name || "";
      favModal.style.display = "grid";
      setTimeout(() => favNameInput.focus(), 50);
    }

    function closeFavoriteModal() {
      favoriteModalHash = null;
      favModal.style.display = "none";
    }

    async function saveFavorite() {
      const hash = sanitizeHash(favoriteModalHash || hashInput.value);
      if (!HASH_RE.test(hash)) return;
      const name = favNameInput.value.trim() || `Canal ${hash.slice(0, 8)}`;
      state.favorites = state.favorites.filter((item) => item.hash !== hash);
      state.favorites.unshift({ hash, name, date: new Date().toISOString() });
      state.history = state.history.map((item) => item.hash === hash ? { ...item, name } : item);
      await saveState();
      closeFavoriteModal();
      setMessage("Favorito guardado.", "ok");
    }

    async function removeItem(type, hash) {
      if (type === "fav") state.favorites = state.favorites.filter((item) => item.hash !== hash);
      else state.history = state.history.filter((item) => item.hash !== hash);
      await saveState();
    }

    async function clearHistory() {
      state.history = [];
      await saveState();
    }

    document.getElementById("playBtn").onclick = () => startPlayback();
    document.getElementById("liveBtn").onclick = seekLiveEdge;
    document.getElementById("saveBtn").onclick = () => openFavoriteModal();
    document.getElementById("testBtn").onclick = () => testStream();
    document.getElementById("stopBtn").onclick = stopPlayback;
    document.getElementById("restartBtn").onclick = restartEngine;
    document.getElementById("clearHistoryBtn").onclick = clearHistory;
    document.getElementById("cancelFavBtn").onclick = closeFavoriteModal;
    document.getElementById("confirmFavBtn").onclick = saveFavorite;
    statusButton.onclick = testConnection;
    hashInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") startPlayback();
    });
    player.addEventListener("waiting", () => {
      if (currentHash) setMessage("Buffering...");
    });
    player.addEventListener("playing", () => {
      if (currentHash) setMessage("Reproduciendo.", "ok");
    });
    favModal.addEventListener("click", (event) => {
      if (event.target === favModal) closeFavoriteModal();
    });

    setOverlay("Ace", "Pega un hash o enlace acestream:// para empezar.");
    loadState();
    testConnection();
    setInterval(testConnection, 30000);
  </script>
</body>
</html>
