<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ace Player</title>
  <link rel="icon" type="image/png" href="/icon.png">
  <link rel="apple-touch-icon" href="/icon.png">
  <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.10/dist/hls.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0d10;
      --surface: #12161b;
      --surface-2: #171d23;
      --surface-3: #20272f;
      --text: #f7f7f2;
      --muted: #9ba6ad;
      --line: rgba(255, 255, 255, 0.09);
      --line-strong: rgba(255, 255, 255, 0.15);
      --accent: #26d07c;
      --accent-2: #f6c85f;
      --accent-dark: #18a765;
      --strong: #8ff0bc;
      --danger: #ff647c;
      --blue: #6eb7ff;
      --shadow: 0 20px 70px rgba(0, 0, 0, 0.42);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; background: var(--bg); }
    body {
      margin: 0;
      background: linear-gradient(180deg, #101419 0%, #0b0d10 38%, #0b0d10 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    button, input { font: inherit; }
    button {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .shell {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: max(14px, env(safe-area-inset-top)) 12px max(28px, env(safe-area-inset-bottom));
    }
    .top {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 12px;
      margin-bottom: 12px;
    }
    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .brand img {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      border: 1px solid var(--line-strong);
      background: #fff;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.24);
    }
    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.05;
      letter-spacing: 0;
    }
    .brand p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .status {
      min-height: 42px;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      backdrop-filter: blur(16px);
    }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--accent-2);
      box-shadow: 0 0 0 4px rgba(246, 200, 95, 0.12);
    }
    .status.online { color: #d7ffe8; border-color: rgba(38, 208, 124, 0.32); }
    .status.online .dot {
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(38, 208, 124, 0.15);
    }
    .status.offline { color: #ffd7de; border-color: rgba(255, 100, 124, 0.32); }
    .status.offline .dot {
      background: var(--danger);
      box-shadow: 0 0 0 4px rgba(255, 100, 124, 0.15);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .player-wrap {
      background: #020304;
      position: relative;
      aspect-ratio: 16 / 9;
      min-height: 212px;
    }
    video {
      width: 100%;
      height: 100%;
      display: block;
      background: #020304;
    }
    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background:
        linear-gradient(180deg, rgba(2, 3, 4, 0.42), rgba(2, 3, 4, 0.86)),
        #020304;
      color: #e5e7eb;
      padding: 22px;
      text-align: center;
      pointer-events: none;
    }
    .overlay-card {
      width: min(390px, 100%);
      display: grid;
      gap: 10px;
      justify-items: center;
    }
    .overlay-title {
      color: #fff;
      font-size: 28px;
      line-height: 1;
      font-weight: 950;
    }
    .overlay-text {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }
    .spinner {
      width: 34px;
      height: 34px;
      border: 3px solid rgba(255, 255, 255, 0.18);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .controls {
      display: grid;
      gap: 10px;
      padding: 12px;
      border-top: 1px solid var(--line);
      background: var(--surface);
    }
    .input-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .hash-input {
      width: 100%;
      min-height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface-2);
      color: var(--text);
      outline: none;
      padding: 0 14px;
      font-size: 13px;
      font-weight: 650;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .hash-input:focus {
      border-color: var(--accent);
      background: #10161b;
      box-shadow: 0 0 0 4px rgba(38, 208, 124, 0.12);
    }
    .button-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .btn {
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface-3);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 0 14px;
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
      min-width: 0;
    }
    .btn:hover { border-color: var(--line-strong); background: #26303a; }
    .btn.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #04120b;
    }
    .btn.primary:hover { background: var(--accent-dark); }
    .btn.danger {
      border-color: rgba(255, 100, 124, 0.28);
      color: var(--danger);
      background: rgba(255, 100, 124, 0.10);
    }
    .btn.blue {
      border-color: rgba(110, 183, 255, 0.28);
      color: var(--blue);
      background: rgba(110, 183, 255, 0.10);
    }
    .message {
      min-height: 20px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      line-height: 1.35;
    }
    .message.ok { color: var(--strong); }
    .message.error { color: var(--danger); }

    .side {
      display: grid;
      gap: 14px;
    }
    .box {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 12px;
    }
    .box-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }
    .box-title {
      margin: 0;
      font-size: 14px;
      font-weight: 850;
    }
    .link-btn {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 4px 0;
      font-size: 12px;
      font-weight: 800;
    }
    .meter {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .metric {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface-2);
      padding: 10px;
      min-width: 0;
    }
    .metric span {
      display: block;
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
    }
    .metric strong {
      display: block;
      margin-top: 4px;
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .list {
      display: grid;
      gap: 8px;
      max-height: 340px;
      overflow: auto;
      padding-right: 1px;
    }
    .empty {
      border: 1px dashed var(--line);
      border-radius: 14px;
      background: var(--surface-2);
      color: var(--muted);
      padding: 18px 10px;
      text-align: center;
      font-size: 13px;
      font-weight: 650;
    }
    .item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface-2);
      padding: 10px;
    }
    .item:hover { border-color: var(--line-strong); background: #1b2229; }
    .item-main {
      min-width: 0;
      border: 0;
      background: transparent;
      text-align: left;
      color: inherit;
      padding: 0;
    }
    .item-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 850;
    }
    .item-hash {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .mini-row {
      display: inline-flex;
      gap: 5px;
    }
    .mini {
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #222a32;
      color: var(--muted);
      font-size: 14px;
      font-weight: 900;
    }
    .mini:hover { color: var(--accent); }
    .mini.delete:hover { color: var(--danger); }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 16px;
      background: rgba(0, 0, 0, 0.58);
      z-index: 20;
      backdrop-filter: blur(10px);
    }
    .modal {
      width: min(420px, 100%);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 16px;
    }
    .modal h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }
    .modal input {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface-2);
      color: var(--text);
      outline: none;
      padding: 0 12px;
      margin-bottom: 12px;
      font-weight: 700;
    }
    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    @media (min-width: 680px) {
      .shell { padding: 20px 18px 38px; }
      .top {
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        margin-bottom: 16px;
      }
      .status { width: auto; min-width: 210px; }
      .input-row { grid-template-columns: minmax(0, 1fr) 150px; }
      .button-row { grid-template-columns: repeat(5, minmax(0, 1fr)); }
      .player-wrap { min-height: 0; }
    }

    @media (min-width: 1020px) {
      .layout { grid-template-columns: minmax(0, 1fr) 330px; gap: 14px; }
      .side { gap: 14px; }
    }

    @media (max-width: 420px) {
      .brand img { width: 38px; height: 38px; }
      h1 { font-size: 20px; }
      .brand p { font-size: 11px; }
      .player-wrap { min-height: 196px; }
      .meter { grid-template-columns: 1fr; }
      .btn { min-height: 44px; padding: 0 10px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="top">
      <div class="brand">
        <img src="/icon.png" alt="">
        <div>
          <h1>AceStream Web</h1>
          <p>Umbrel player</p>
        </div>
      </div>
      <button class="status" id="statusButton" type="button">
        <span class="dot"></span>
        <span id="statusText">Comprobando motor...</span>
      </button>
    </header>

    <div class="layout">
      <section class="panel">
        <div class="player-wrap">
          <video id="player" playsinline controls></video>
          <div class="overlay" id="overlay">
            <div class="overlay-card">
              <div id="overlayIcon" class="overlay-title">Ace</div>
              <div id="overlayText" class="overlay-text">Pega un hash o enlace acestream:// para empezar.</div>
            </div>
          </div>
        </div>

        <div class="controls">
          <div class="input-row">
            <input class="hash-input" id="hashInput" type="text" autocomplete="off" spellcheck="false" placeholder="Pega un hash, acestream://... o enlace con ?id=...">
            <button class="btn primary" id="playBtn" type="button">Reproducir</button>
          </div>
          <div class="button-row">
            <button class="btn blue" id="liveBtn" type="button">Directo</button>
            <button class="btn" id="saveBtn" type="button">Guardar</button>
            <button class="btn" id="stopBtn" type="button">Parar</button>
            <button class="btn" id="pipBtn" type="button">PiP</button>
            <button class="btn danger" id="restartBtn" type="button">Reiniciar</button>
          </div>
          <div class="message" id="message"></div>
        </div>
      </section>

      <aside class="side">
        <section class="box">
          <div class="box-head">
            <h2 class="box-title">Estado</h2>
          </div>
          <div class="meter">
            <div class="metric"><span>Stream</span><strong id="streamMetric">Sin cargar</strong></div>
            <div class="metric"><span>Buffer</span><strong id="bufferMetric">0s</strong></div>
            <div class="metric"><span>Latencia</span><strong id="latencyMetric">--</strong></div>
            <div class="metric"><span>Reintentos</span><strong id="retryMetric">0</strong></div>
          </div>
        </section>

        <section class="box">
          <div class="box-head">
            <h2 class="box-title">Favoritos</h2>
          </div>
          <div class="list" id="favList"></div>
        </section>

        <section class="box">
          <div class="box-head">
            <h2 class="box-title">Recientes</h2>
            <button class="link-btn" id="clearHistoryBtn" type="button">Limpiar</button>
          </div>
          <div class="list" id="histList"></div>
        </section>
      </aside>
    </div>
  </main>

  <div class="modal-backdrop" id="favModal">
    <div class="modal">
      <h2>Guardar favorito</h2>
      <input id="favNameInput" placeholder="Nombre del canal">
      <div class="modal-actions">
        <button class="btn" id="cancelFavBtn" type="button">Cancelar</button>
        <button class="btn primary" id="confirmFavBtn" type="button">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    const SERVER = "";
    const HASH_RE = /^[a-fA-F0-9]{40}$/;
    const MAX_HIST = 30;
    const player = document.getElementById("player");
    const overlay = document.getElementById("overlay");
    const overlayIcon = document.getElementById("overlayIcon");
    const overlayText = document.getElementById("overlayText");
    const hashInput = document.getElementById("hashInput");
    const message = document.getElementById("message");
    const statusButton = document.getElementById("statusButton");
    const statusText = document.getElementById("statusText");
    const favList = document.getElementById("favList");
    const histList = document.getElementById("histList");
    const favModal = document.getElementById("favModal");
    const favNameInput = document.getElementById("favNameInput");
    const streamMetric = document.getElementById("streamMetric");
    const bufferMetric = document.getElementById("bufferMetric");
    const latencyMetric = document.getElementById("latencyMetric");
    const retryMetric = document.getElementById("retryMetric");

    let hls = null;
    let tsPlayer = null;
    let currentHash = null;
    let state = { favorites: [], history: [] };
    let storageMode = "server";
    let retryCount = 0;
    let favoriteModalHash = null;
    let metricsTimer = null;

    function sanitizeHash(value) {
      const raw = String(value || "").trim();
      const decoded = (() => {
        try {
          return decodeURIComponent(raw);
        } catch {
          return raw;
        }
      })();
      const queryMatch = decoded.match(/[?&](?:id|content_id|hash)=([a-fA-F0-9]{40})/);
      const uriMatch = decoded.match(/acestream:\/\/([a-fA-F0-9]{40})/i);
      const hashMatch = decoded.match(/[a-fA-F0-9]{40}/);
      return (queryMatch?.[1] || uriMatch?.[1] || hashMatch?.[0] || "").trim();
    }

    function setOverlay(title, text = "", loading = false) {
      overlay.style.display = "grid";
      overlayIcon.innerHTML = loading ? '<div class="spinner"></div>' : title;
      overlayText.textContent = text || title;
    }

    function hideOverlay() {
      overlay.style.display = "none";
    }

    function setMessage(text, type = "") {
      message.textContent = text;
      message.className = `message ${type}`;
    }

    function localState() {
      return {
        favorites: JSON.parse(localStorage.getItem("ace_favs") || "[]"),
        history: JSON.parse(localStorage.getItem("ace_hist") || "[]"),
      };
    }

    function writeLocal(next) {
      localStorage.setItem("ace_favs", JSON.stringify(next.favorites || []));
      localStorage.setItem("ace_hist", JSON.stringify(next.history || []));
    }

    async function apiState(method = "GET", payload) {
      const options = { method, headers: { "Content-Type": "application/json" } };
      if (payload) options.body = JSON.stringify(payload);
      const response = await fetch(`${SERVER}/api/state`, options);
      if (!response.ok) throw new Error("state api failed");
      return response.json();
    }

    async function loadState() {
      try {
        state = await apiState();
        storageMode = "server";
        const legacy = localState();
        if (!state.favorites.length && legacy.favorites.length) {
          state.favorites = legacy.favorites;
          await saveState(false);
        }
      } catch {
        storageMode = "local";
        state = localState();
      }
      renderAll();
    }

    async function saveState(render = true) {
      state.history = state.history.slice(0, MAX_HIST);
      if (storageMode === "server") {
        try {
          state = await apiState("PUT", state);
        } catch {
          storageMode = "local";
          writeLocal(state);
        }
      } else {
        writeLocal(state);
      }
      if (render) renderAll();
    }

    function favoriteForHash(hash) {
      return state.favorites.find((item) => item.hash === hash);
    }

    function displayNameForHash(hash, fallbackName) {
      return favoriteForHash(hash)?.name || fallbackName || `Canal ${hash.slice(0, 8)}`;
    }

    async function addHistory(hash) {
      const favorite = favoriteForHash(hash);
      const playedAt = new Date().toISOString();
      if (favorite) {
        state.favorites = state.favorites.filter((item) => item.hash !== hash);
        state.favorites.unshift({ ...favorite, date: playedAt });
      }
      state.history = state.history.filter((item) => item.hash !== hash);
      state.history.unshift({ hash, name: displayNameForHash(hash), date: playedAt });
      await saveState();
    }

    async function testConnection() {
      statusButton.className = "status";
      statusText.textContent = "Comprobando motor...";
      try {
        const response = await fetch(`${SERVER}/webui/api/service?method=get_version`, { signal: AbortSignal.timeout(5000) });
        if (!response.ok) throw new Error("engine offline");
        const data = await response.json();
        statusButton.className = "status online";
        statusText.textContent = data?.result?.version ? `Motor activo v${data.result.version}` : "Motor activo";
      } catch {
        statusButton.className = "status offline";
        statusText.textContent = "Motor sin respuesta";
      }
    }

    function manifestUrl(hash) {
      return `${SERVER}/ace/manifest.m3u8?id=${hash}&_=${Date.now()}`;
    }

    function streamUrl(hash) {
      return `${SERVER}/ace/getstream?id=${hash}&_=${Date.now()}`;
    }

    function destroyPlayer() {
      if (tsPlayer) {
        tsPlayer.unload();
        tsPlayer.detachMediaElement();
        tsPlayer.destroy();
        tsPlayer = null;
      }
      if (hls) {
        hls.destroy();
        hls = null;
      }
      player.pause();
      player.removeAttribute("src");
      player.load();
      stopMetrics();
    }

    function liveEdge() {
      if (!player.seekable || !player.seekable.length) return null;
      const value = player.seekable.end(player.seekable.length - 1);
      return Number.isFinite(value) ? value : null;
    }

    function bufferAhead() {
      if (!player.buffered || !player.buffered.length) return 0;
      for (let i = 0; i < player.buffered.length; i += 1) {
        if (player.currentTime >= player.buffered.start(i) && player.currentTime <= player.buffered.end(i)) {
          return Math.max(player.buffered.end(i) - player.currentTime, 0);
        }
      }
      return 0;
    }

    function updateMetrics() {
      const buffer = bufferAhead();
      const edge = liveEdge();
      bufferMetric.textContent = `${Math.round(buffer)}s`;
      latencyMetric.textContent = edge ? `${Math.max(Math.round(edge - player.currentTime), 0)}s` : "--";
      retryMetric.textContent = String(retryCount);
      streamMetric.textContent = currentHash ? displayNameForHash(currentHash) : "Sin cargar";
    }

    function startMetrics() {
      stopMetrics();
      updateMetrics();
      metricsTimer = setInterval(updateMetrics, 1000);
    }

    function stopMetrics() {
      if (metricsTimer) clearInterval(metricsTimer);
      metricsTimer = null;
      updateMetrics();
    }

    function seekLiveEdge() {
      const edge = liveEdge();
      if (edge === null) {
        setMessage("Todavia no hay borde directo disponible.", "error");
        return;
      }
      player.currentTime = Math.max(edge - 18, 0);
      player.play().catch(() => setMessage("Pulsa play en el video.", ""));
      setMessage("Saltando cerca del directo.", "ok");
    }

    async function startPlayback(value) {
      const hash = sanitizeHash(value || hashInput.value);
      if (!HASH_RE.test(hash)) {
        setMessage("Hash invalido: debe tener 40 caracteres hexadecimales.", "error");
        return;
      }

      currentHash = hash;
      hashInput.value = hash;
      retryCount = 0;
      retryMetric.textContent = "0";
      await addHistory(hash);
      destroyPlayer();
      setMessage("");
      setOverlay("Conectando", "Abriendo stream AceStream...", true);

      startHlsPlayback(hash);
      return;

      if (window.mpegts && mpegts.isSupported()) {
        tsPlayer = mpegts.createPlayer({
          type: "mpegts",
          isLive: true,
          url: streamUrl(hash),
        }, {
          enableWorker: true,
          liveBufferLatencyChasing: false,
          liveSync: false,
          lazyLoad: false,
          stashInitialSize: 384 * 1024,
          autoCleanupSourceBuffer: true,
          autoCleanupMaxBackwardDuration: 90,
          autoCleanupMinBackwardDuration: 45,
        });
        tsPlayer.attachMediaElement(player);
        tsPlayer.load();
        tsPlayer.on(mpegts.Events.ERROR, () => {
          retryCount += 1;
          updateMetrics();
          setMessage("El stream directo se ha cortado. Probando HLS...", "error");
          if (tsPlayer) {
            tsPlayer.unload();
            tsPlayer.detachMediaElement();
            tsPlayer.destroy();
            tsPlayer = null;
          }
          startHlsPlayback(hash);
        });
        player.addEventListener("loadedmetadata", () => {
          hideOverlay();
          startMetrics();
        }, { once: true });
        player.play().catch(() => setMessage("Pulsa play en el video.", ""));
        setMessage("Usando stream directo. Es mas estable que HLS para AceStream.", "ok");
        return;
      }

      startHlsPlayback(hash);
    }

    function startHlsPlayback(hash) {
      const url = manifestUrl(hash);
      if (window.Hls && Hls.isSupported()) {
        hls = new Hls({
          enableWorker: true,
          lowLatencyMode: false,
          liveDurationInfinity: true,
          liveSyncDuration: 22,
          liveMaxLatencyDuration: 75,
          maxLiveSyncPlaybackRate: 1.02,
          maxBufferLength: 90,
          maxMaxBufferLength: 180,
          backBufferLength: 45,
          maxBufferHole: 2,
          manifestLoadingTimeOut: 35000,
          manifestLoadingMaxRetry: 10,
          manifestLoadingRetryDelay: 1500,
          levelLoadingTimeOut: 35000,
          levelLoadingMaxRetry: 10,
          fragLoadingTimeOut: 60000,
          fragLoadingMaxRetry: 10,
          fragLoadingRetryDelay: 1500,
        });
        hls.loadSource(url);
        hls.attachMedia(player);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          hideOverlay();
          startMetrics();
          player.play().catch(() => setMessage("Pulsa play en el video.", ""));
          setMessage("Stream cargado. Si se queda sin buffer, espera unos segundos.", "ok");
        });
        hls.on(Hls.Events.ERROR, (_, data) => {
          if (!data.fatal) return;
          retryCount += 1;
          updateMetrics();
          if (data.type === Hls.ErrorTypes.NETWORK_ERROR && retryCount <= 8) {
            setMessage(`Reconectando segmento (${retryCount}/8)...`);
            setTimeout(() => hls && hls.startLoad(), Math.min(1200 * retryCount, 6000));
            return;
          }
          if (data.type === Hls.ErrorTypes.MEDIA_ERROR && retryCount <= 4) {
            setMessage("Recuperando el reproductor...");
            hls.recoverMediaError();
            return;
          }
          setOverlay("Stream detenido", "Reinicia el motor o prueba de nuevo en unos segundos.");
          setMessage("El reproductor no pudo recuperar el stream.", "error");
        });
      } else if (player.canPlayType("application/vnd.apple.mpegurl")) {
        player.src = url;
        hideOverlay();
        startMetrics();
        player.play().catch(() => setMessage("Pulsa play en el video.", ""));
      } else {
        setOverlay("HLS no soportado", "Este navegador no puede reproducir este stream.");
      }
    }

    function stopPlayback() {
      currentHash = null;
      destroyPlayer();
      setMessage("");
      setOverlay("Ace", "Pega un hash o enlace acestream:// para empezar.");
    }

    async function restartEngine() {
      const previousHash = currentHash;
      document.getElementById("restartBtn").disabled = true;
      setMessage("Reiniciando motor AceStream...");
      try {
        const response = await fetch(`${SERVER}/api/restart-engine`, {
          method: "POST",
          headers: { "X-Ace-Action": "restart-engine" },
        });
        if (!response.ok) throw new Error(response.status === 429 ? "cooldown" : "failed");
        setMessage("Motor reiniciado. Esperando a que vuelva...", "ok");
        destroyPlayer();
        setOverlay("Motor reiniciado", "Espera unos segundos antes de reproducir.");
        setTimeout(testConnection, 3500);
        if (previousHash) setTimeout(() => startPlayback(previousHash), 7000);
      } catch (error) {
        setMessage(error.message === "cooldown" ? "Espera unos segundos antes de reiniciar otra vez." : "No se pudo reiniciar el motor.", "error");
      } finally {
        setTimeout(() => {
          document.getElementById("restartBtn").disabled = false;
        }, 3000);
      }
    }

    async function enterPictureInPicture() {
      if (!currentHash || player.readyState < 2) {
        setMessage("Primero reproduce un stream.", "error");
        return;
      }
      if (!document.pictureInPictureEnabled || player.disablePictureInPicture) {
        setMessage("PiP no esta disponible en este navegador.", "error");
        return;
      }
      try {
        if (document.pictureInPictureElement) await document.exitPictureInPicture();
        else await player.requestPictureInPicture();
      } catch {
        setMessage("El navegador ha bloqueado PiP.", "error");
      }
    }

    function renderList(container, items, type) {
      if (!items.length) {
        container.innerHTML = `<div class="empty">${type === "fav" ? "Sin favoritos" : "Sin recientes"}</div>`;
        return;
      }
      container.innerHTML = "";
      items.forEach((item) => {
        const row = document.createElement("div");
        row.className = "item";

        const main = document.createElement("button");
        main.type = "button";
        main.className = "item-main";
        main.onclick = () => startPlayback(item.hash);
        main.innerHTML = '<div class="item-name"></div><div class="item-hash"></div>';
        main.querySelector(".item-name").textContent = displayNameForHash(item.hash, item.name);
        main.querySelector(".item-hash").textContent = item.hash;

        const actions = document.createElement("div");
        actions.className = "mini-row";

        const fav = document.createElement("button");
        fav.type = "button";
        fav.className = "mini";
        fav.textContent = type === "fav" ? "E" : "+";
        fav.title = type === "fav" ? "Renombrar" : "Guardar favorito";
        fav.onclick = () => openFavoriteModal(item.hash);
        actions.appendChild(fav);

        const del = document.createElement("button");
        del.type = "button";
        del.className = "mini delete";
        del.textContent = "x";
        del.title = "Eliminar";
        del.onclick = () => removeItem(type, item.hash);
        actions.appendChild(del);

        row.append(main, actions);
        container.appendChild(row);
      });
    }

    function renderAll() {
      renderList(favList, state.favorites, "fav");
      renderList(histList, state.history, "hist");
      updateMetrics();
    }

    function openFavoriteModal(hash) {
      const cleanHash = sanitizeHash(hash || hashInput.value);
      if (!HASH_RE.test(cleanHash)) {
        setMessage("Introduce un hash valido primero.", "error");
        return;
      }
      hashInput.value = cleanHash;
      favoriteModalHash = cleanHash;
      favNameInput.value = state.favorites.find((item) => item.hash === cleanHash)?.name || "";
      favModal.style.display = "grid";
      setTimeout(() => favNameInput.focus(), 50);
    }

    function closeFavoriteModal() {
      favModal.style.display = "none";
      favoriteModalHash = null;
    }

    async function saveFavorite() {
      const hash = sanitizeHash(favoriteModalHash || hashInput.value);
      if (!HASH_RE.test(hash)) return;
      const name = favNameInput.value.trim() || `Canal ${hash.slice(0, 8)}`;
      state.favorites = state.favorites.filter((item) => item.hash !== hash);
      state.favorites.unshift({ hash, name, date: new Date().toISOString() });
      state.history = state.history.map((item) => item.hash === hash ? { ...item, name } : item);
      await saveState();
      closeFavoriteModal();
      setMessage("Favorito guardado.", "ok");
    }

    async function removeItem(type, hash) {
      if (type === "fav") state.favorites = state.favorites.filter((item) => item.hash !== hash);
      else state.history = state.history.filter((item) => item.hash !== hash);
      await saveState();
    }

    async function clearHistory() {
      state.history = [];
      await saveState();
    }

    document.getElementById("playBtn").onclick = () => startPlayback();
    document.getElementById("liveBtn").onclick = seekLiveEdge;
    document.getElementById("saveBtn").onclick = () => openFavoriteModal();
    document.getElementById("stopBtn").onclick = stopPlayback;
    document.getElementById("pipBtn").onclick = enterPictureInPicture;
    document.getElementById("restartBtn").onclick = restartEngine;
    document.getElementById("clearHistoryBtn").onclick = clearHistory;
    document.getElementById("cancelFavBtn").onclick = closeFavoriteModal;
    document.getElementById("confirmFavBtn").onclick = saveFavorite;
    statusButton.onclick = testConnection;
    hashInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") startPlayback();
    });
    player.addEventListener("waiting", () => {
      if (currentHash) setMessage("Buffering... no salto al directo automaticamente.");
    });
    player.addEventListener("playing", () => {
      if (currentHash) setMessage("Reproduciendo.", "ok");
    });
    favModal.addEventListener("click", (event) => {
      if (event.target === favModal) closeFavoriteModal();
    });

    setOverlay("Ace", "Pega un hash o enlace acestream:// para empezar.");
    updateMetrics();
    loadState();
    testConnection();
    setInterval(testConnection, 30000);
  </script>
</body>
</html>
