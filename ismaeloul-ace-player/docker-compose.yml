version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: ismaeloul-ace-player_nginx_1
      APP_PORT: "80"
      PROXY_AUTH_ADD: "true"

  acestream:
    image: wafy80/acestream@sha256:8ffbc03916d8e33d321430f9ca1731ef3b058e72eeb9d9f7b322e9f7de654edc
    container_name: ismaeloul-ace-player_acestream_1
    restart: unless-stopped

  storage:
    image: node:20.19-alpine
    container_name: ismaeloul-ace-player_storage_1
    restart: unless-stopped
    working_dir: /app
    command: |
      sh -c "
        wget -q -O /app/server.js 'https://raw.githubusercontent.com/Ismaeloul/umbrel-app-store/main/ismaeloul-ace-player/server.js?v=2.0.3' &&
        node /app/server.js
      "
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - /var/run/docker.sock:/var/run/docker.sock

  nginx:
    image: nginx:1.27-alpine
    container_name: ismaeloul-ace-player_nginx_1
    restart: unless-stopped
    depends_on:
      - acestream
      - storage
    command: |
      sh -c "
        mkdir -p /www &&
        wget -q -O /www/index.html 'https://raw.githubusercontent.com/Ismaeloul/umbrel-app-store/main/ismaeloul-ace-player/index.html?v=2.0.3' &&
        wget -q -O /www/icon.svg 'https://raw.githubusercontent.com/Ismaeloul/umbrel-app-store/main/ismaeloul-ace-player/icon.svg?v=2.0.3' &&
        printf '%s\n' \
          'events {}' \
          'http {' \
          '  server {' \
          '    listen 80;' \
          '    client_max_body_size 1m;' \
          '    add_header X-Content-Type-Options nosniff always;' \
          '    add_header Referrer-Policy same-origin always;' \
          '    add_header X-Robots-Tag noindex always;' \
          '    location / {' \
          '      root /www;' \
          '      index index.html;' \
          '    }' \
          '    location /api/ {' \
          '      proxy_pass http://storage:3000/api/;' \
          '      proxy_set_header Host $$http_host;' \
          '    }' \
          '    location /ace/ {' \
          '      proxy_pass http://acestream:6878/ace/;' \
          '      proxy_http_version 1.1;' \
          '      proxy_set_header Host $$http_host;' \
          '      proxy_set_header Connection "";' \
          '      proxy_set_header Accept-Encoding "";' \
          '      proxy_buffering off;' \
          '      proxy_request_buffering off;' \
          '      proxy_read_timeout 3600s;' \
          '      proxy_send_timeout 3600s;' \
          '      proxy_redirect ~^http://[^/]+/(ace|content)/(.*)$$ $$scheme://$$http_host/$$1/$$2;' \
          '      sub_filter_types application/vnd.apple.mpegurl application/x-mpegURL audio/mpegurl text/plain;' \
          '      sub_filter_once off;' \
          '      sub_filter http://127.0.0.1:6878/ace/ /ace/;' \
          '      sub_filter http://localhost:6878/ace/ /ace/;' \
          '    }' \
          '    location /content/ {' \
          '      proxy_pass http://acestream:6878/content/;' \
          '      proxy_http_version 1.1;' \
          '      proxy_set_header Host $$http_host;' \
          '      proxy_set_header Connection "";' \
          '      proxy_buffering off;' \
          '      proxy_request_buffering off;' \
          '      proxy_read_timeout 3600s;' \
          '      proxy_send_timeout 3600s;' \
          '    }' \
          '    location /webui/ {' \
          '      proxy_pass http://acestream:6878/webui/;' \
          '      proxy_set_header Host $$http_host;' \
          '      proxy_redirect off;' \
          '    }' \
          '  }' \
          '}' > /etc/nginx/nginx.conf &&
        nginx -g 'daemon off;'
      "
