version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: ismaeloul-ace-player_nginx_1
      APP_PORT: "80"
      PROXY_AUTH_ADD: "false"

  acestream:
    image: wafy80/acestream:latest
    container_name: ismaeloul-ace-player_acestream_1
    restart: unless-stopped
    ports:
      - "6878:6878"

  storage:
    image: node:20-alpine
    container_name: ismaeloul-ace-player_storage_1
    restart: unless-stopped
    working_dir: /app
    command: |
      sh -c "
        wget -q -O /app/server.js https://raw.githubusercontent.com/Ismaeloul/umbrel-app-store/main/ismaeloul-ace-player/server.js &&
        node /app/server.js
      "
    volumes:
      - ${APP_DATA_DIR}/data:/data

  nginx:
    image: nginx:alpine
    container_name: ismaeloul-ace-player_nginx_1
    restart: unless-stopped
    depends_on:
      - acestream
      - storage
    command: |
      sh -c "
        mkdir -p /www &&
        wget -q -O /www/index.html https://raw.githubusercontent.com/Ismaeloul/umbrel-app-store/main/ismaeloul-ace-player/index.html &&
        printf 'events{}\\nhttp{server{listen 80;location /{root /www;index index.html;}location /api/{proxy_pass http://ismaeloul-ace-player_storage_1:3000/api/;}location /ace/{proxy_pass http://ismaeloul-ace-player_acestream_1:6878/ace/;proxy_set_header Host $$http_host;proxy_redirect off;add_header Access-Control-Allow-Origin *;}location /webui/{proxy_pass http://ismaeloul-ace-player_acestream_1:6878/webui/;proxy_set_header Host $$http_host;proxy_redirect off;add_header Access-Control-Allow-Origin *;}}}' > /etc/nginx/nginx.conf &&
        nginx -g 'daemon off;'
      "
