version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: ismaeloul-nutritrack_server_1
      APP_PORT: "3000"
      PROXY_AUTH_ADD: "false"

  server:
    image: node:20-alpine
    container_name: ismaeloul-nutritrack_server_1
    restart: unless-stopped
    volumes:
      - ${APP_DATA_DIR}/data:/data
    command: |
      sh -c "
        mkdir -p /app /data &&
        wget -q -O /app/index.html 'https://raw.githubusercontent.com/Ismaeloul/umbrel-app-store/main/ismaeloul-nutritrack/index.html?v=1.6.1' &&
        wget -q -O /app/server.js 'https://raw.githubusercontent.com/Ismaeloul/umbrel-app-store/main/ismaeloul-nutritrack/server.js?v=1.6.1' &&
        wget -q -O /app/bedca-foods.json 'https://raw.githubusercontent.com/Ismaeloul/umbrel-app-store/main/ismaeloul-nutritrack/bedca-foods.json?v=1.6.1' &&
        cd /app &&
        DATA_DIR=/data PORT=3000 node server.js
      "
