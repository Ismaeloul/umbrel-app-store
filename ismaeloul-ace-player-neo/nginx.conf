server {
  listen 80;
  client_max_body_size 2m;

  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy same-origin always;
  add_header X-Robots-Tag noindex always;

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://ismaeloul-ace-player-neo_storage_1:3000/api/;
    proxy_set_header Host $http_host;
  }

  location /ace/ {
    proxy_pass http://ismaeloul-ace-player-neo_acestream_1:6878/ace/;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header Connection "";
    proxy_set_header Accept-Encoding "";
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_redirect ~^http://[^/]+/(ace|content)/(.*)$ $scheme://$http_host/$1/$2;
    sub_filter_types application/vnd.apple.mpegurl application/x-mpegURL audio/mpegurl text/plain;
    sub_filter_once off;
    sub_filter http://127.0.0.1:6878/ace/ /ace/;
    sub_filter http://localhost:6878/ace/ /ace/;
    sub_filter http://acestream:6878/ace/ /ace/;
    sub_filter http://ismaeloul-ace-player-neo_acestream_1:6878/ace/ /ace/;
    sub_filter http://127.0.0.1:6878/content/ /content/;
    sub_filter http://localhost:6878/content/ /content/;
    sub_filter http://acestream:6878/content/ /content/;
    sub_filter http://ismaeloul-ace-player-neo_acestream_1:6878/content/ /content/;
  }

  location /content/ {
    proxy_pass http://ismaeloul-ace-player-neo_acestream_1:6878/content/;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_redirect ~^http://[^/]+/content/(.*)$ $scheme://$http_host/content/$1;
  }

  location /webui/ {
    proxy_pass http://ismaeloul-ace-player-neo_acestream_1:6878/webui/;
    proxy_set_header Host $http_host;
    proxy_redirect off;
  }
}
