<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ace Player Neo - Umbrel</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <link rel="apple-touch-icon" href="/icon.svg">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#09090b',
                        surface: '#18181b',
                        surfaceHover: '#27272a',
                        border: '#27272a',
                        brand: {
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-up': 'slideUp 0.4s ease-out',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'spin-fast': 'spin 0.5s linear infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.10/dist/hls.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b;
            color: #fafafa;
            -webkit-tap-highlight-color: transparent;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
        .glass-panel {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        video::-webkit-media-controls-panel { background: rgba(9,9,11,0.7); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const IconButton = ({ icon, onClick, active, variant = 'ghost', className = "", title, disabled }) => {
            const base = "p-2.5 rounded-xl flex items-center justify-center transition-all duration-200 active:scale-95 disabled:opacity-50 disabled:pointer-events-none";
            const variants = {
                ghost: `hover:bg-surfaceHover text-gray-400 hover:text-white ${active ? 'bg-surfaceHover text-brand-400' : ''}`,
                primary: "bg-brand-500 hover:bg-brand-600 text-white shadow-lg shadow-brand-500/25",
                danger: "bg-red-500/10 hover:bg-red-500/20 text-red-500",
                glass: "bg-white/5 hover:bg-white/10 backdrop-blur-md text-white border border-white/10"
            };
            return (
                <button className={`${base} ${variants[variant]} ${className}`} onClick={onClick} title={title} disabled={disabled}>
                    <i data-lucide={icon} className="w-5 h-5"></i>
                </button>
            );
        };

        const EngineStatus = ({ status, onRestart, isRestarting }) => {
            const isOnline = status === 'online';
            const isConnecting = status === 'connecting';

            return (
                <div className="flex items-center gap-2">
                    <div className={`flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-medium border ${
                        isOnline ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' :
                        isConnecting ? 'bg-amber-500/10 text-amber-400 border-amber-500/20' :
                        'bg-red-500/10 text-red-400 border-red-500/20'
                    }`}>
                        <span className="relative flex h-2 w-2">
                            {(isOnline || isConnecting) && <span className={`animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 ${isOnline ? 'bg-emerald-400' : 'bg-amber-400'}`}></span>}
                            <span className={`relative inline-flex rounded-full h-2 w-2 ${isOnline ? 'bg-emerald-500' : isConnecting ? 'bg-amber-500' : 'bg-red-500'}`}></span>
                        </span>
                        <span className="capitalize">{status}</span>
                    </div>
                    <button
                        onClick={onRestart}
                        disabled={isRestarting}
                        className="p-1.5 rounded-full hover:bg-surfaceHover text-gray-400 hover:text-white transition-colors disabled:opacity-50"
                        title="Reiniciar Motor"
                    >
                        <i data-lucide="refresh-cw" className={`w-4 h-4 ${isRestarting ? 'animate-spin text-brand-400' : ''}`}></i>
                    </button>
                </div>
            );
        };

        const ContentCard = ({ title, id, type = 'recent', category, onClick, onOptionsClick }) => {
            const categoryColors = {
                'Deportes': 'bg-orange-500/10 text-orange-400 border-orange-500/20',
                'Cine': 'bg-purple-500/10 text-purple-400 border-purple-500/20',
                'General': 'bg-gray-500/10 text-gray-400 border-gray-500/20'
            };
            const catColor = categoryColors[category] || categoryColors['General'];

            return (
                <div
                    onClick={onClick}
                    className="group relative overflow-hidden rounded-2xl bg-surface border border-border p-4 hover:border-brand-500/50 hover:shadow-[0_0_15px_rgba(14,165,233,0.15)] transition-all duration-300 cursor-pointer flex flex-col gap-3"
                >
                    <div className="flex justify-between items-start">
                        <div className="flex gap-2 items-center">
                            <div className={`p-2 rounded-lg ${type === 'fav' ? 'bg-yellow-500/10 text-yellow-500' : type === 'web' ? 'bg-brand-500/10 text-brand-400' : 'bg-brand-500/10 text-brand-400'}`}>
                                <i data-lucide={type === 'fav' ? 'star' : type === 'web' ? 'globe' : 'clock'} className={`w-4 h-4 ${type === 'fav' ? 'fill-yellow-500/20' : ''}`}></i>
                            </div>
                            {category && (
                                <span className={`text-[10px] uppercase font-bold tracking-wider px-2 py-1 rounded-md border ${catColor} flex items-center`}>
                                    {category}
                                </span>
                            )}
                        </div>
                        <button
                            onClick={(e) => { e.stopPropagation(); onOptionsClick(); }}
                            className="opacity-0 group-hover:opacity-100 transition-opacity p-1.5 text-gray-400 hover:text-white hover:bg-white/10 rounded-lg relative z-10 active:scale-95"
                        >
                            <i data-lucide="more-vertical" className="w-5 h-5"></i>
                        </button>
                    </div>
                    <div>
                        <h4 className="font-medium text-gray-100 truncate pr-4">{title}</h4>
                        <p className="text-xs text-gray-500 font-mono truncate mt-1">{id.substring(0, 16)}...</p>
                    </div>
                </div>
            );
        };

        const AppNeo = () => {
            const HASH_RE = /^[a-fA-F0-9]{40}$/;
            const videoRef = useRef(null);
            const hlsRef = useRef(null);

            const [engineStatus, setEngineStatus] = useState('offline');
            const [isRestarting, setIsRestarting] = useState(false);
            const [aceId, setAceId] = useState('');
            const [currentTitle, setCurrentTitle] = useState('');
            const [isPlaying, setIsPlaying] = useState(false);
            const [isConnecting, setIsConnecting] = useState(false);
            const [message, setMessage] = useState('Introduce un ID para comenzar a transmitir');
            const [error, setError] = useState('');
            const [needsTap, setNeedsTap] = useState(false);
            const [activeTabMobile, setActiveTabMobile] = useState('player');
            const [libraryFilter, setLibraryFilter] = useState('fav');
            const [showNerdStats, setShowNerdStats] = useState(false);

            // Modales
            const [showSettingsModal, setShowSettingsModal] = useState(false);
            const [saveModalOpen, setSaveModalOpen] = useState(false);
            const [customTitle, setCustomTitle] = useState('');
            const [actionItem, setActionItem] = useState(null);
            const [editModalOpen, setEditModalOpen] = useState(false);
            const [editTitle, setEditTitle] = useState('');

            // Web Syncing
            const [syncUrl, setSyncUrl] = useState('https://ipfs.io/ipns/k51qzi5uqu5di462t7j4vu4akwfhvtjhy88qbupktvoacqfqe9uforjvhyi4wr/hashes_acestream.m3u');
            const [isSyncing, setIsSyncing] = useState(false);
            const [syncError, setSyncError] = useState('');
            const [remoteStreams, setRemoteStreams] = useState([]);

            const [localLibrary, setLocalLibrary] = useState([]);

            useEffect(() => {
                lucide.createIcons();
            });

            useEffect(() => {
                loadState();
                checkEngine();
                const interval = setInterval(checkEngine, 20000);
                return () => {
                    clearInterval(interval);
                    destroyPlayer();
                };
            }, []);

            const normalizeAceId = (value) => {
                const raw = String(value || '').trim();
                const aceMatch = raw.match(/acestream:\/\/([a-fA-F0-9]{40})/);
                if (aceMatch) return aceMatch[1].toLowerCase();
                try {
                    const parsed = new URL(raw);
                    const urlId = parsed.searchParams.get('id') || parsed.searchParams.get('content_id');
                    if (urlId && HASH_RE.test(urlId)) return urlId.toLowerCase();
                } catch {}
                const hashMatch = raw.match(/[a-fA-F0-9]{40}/);
                return hashMatch ? hashMatch[0].toLowerCase() : '';
            };

            const statePayload = (local = localLibrary, web = remoteStreams) => ({
                favorites: local.filter(item => item.type === 'fav'),
                history: local.filter(item => item.type === 'recent'),
                web
            });

            const persistState = async (local = localLibrary, web = remoteStreams) => {
                try {
                    await fetch('/api/state', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(statePayload(local, web))
                    });
                } catch {
                    setError('No se pudo guardar la biblioteca.');
                }
            };

            const loadState = async () => {
                try {
                    const response = await fetch('/api/state', { cache: 'no-store' });
                    if (!response.ok) throw new Error('state');
                    const state = await response.json();
                    const favorites = (state.favorites || []).map(item => ({ ...item, type: 'fav' }));
                    const history = (state.history || []).map(item => ({ ...item, type: 'recent' }));
                    const web = (state.web || []).map(item => ({ ...item, type: 'web' }));
                    setLocalLibrary([...favorites, ...history]);
                    setRemoteStreams(web);
                } catch {
                    setError('Backend no disponible. Revisa que Ace Player Neo haya arrancado en Umbrel.');
                }
            };

            const checkEngine = async () => {
                try {
                    const response = await fetch('/api/engine/status', { cache: 'no-store' });
                    const data = await response.json();
                    setEngineStatus(data.online ? 'online' : 'offline');
                } catch {
                    setEngineStatus('offline');
                }
            };

            const destroyPlayer = () => {
                if (hlsRef.current) {
                    hlsRef.current.destroy();
                    hlsRef.current = null;
                }
                const video = videoRef.current;
                if (video) {
                    video.pause();
                    video.removeAttribute('src');
                    video.load();
                }
            };

            const playHls = (id) => {
                const video = videoRef.current;
                if (!video) return;
                destroyPlayer();
                const source = `/ace/manifest.m3u8?id=${id}&_=${Date.now()}`;
                setIsConnecting(true);
                setError('');
                setNeedsTap(false);
                setMessage('Conectando con AceStream...');

                if (window.Hls && Hls.isSupported()) {
                    const hls = new Hls({
                        liveSyncDurationCount: 3,
                        manifestLoadingTimeOut: 20000,
                        fragLoadingTimeOut: 20000,
                    });
                    hlsRef.current = hls;
                    hls.loadSource(source);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        setIsConnecting(false);
                        setIsPlaying(true);
                        setEngineStatus('online');
                        setMessage('');
                        video.play().catch(() => setNeedsTap(true));
                    });
                    hls.on(Hls.Events.ERROR, (_, data) => {
                        if (!data.fatal) return;
                        if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                            hls.recoverMediaError();
                            return;
                        }
                        setIsConnecting(false);
                        setIsPlaying(false);
                        setError('No se pudo cargar el stream. Comprueba el ID o espera a que AceStream encuentre pares.');
                        setMessage('');
                    });
                    return;
                }

                if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = source;
                    video.play().then(() => {
                        setIsConnecting(false);
                        setIsPlaying(true);
                        setEngineStatus('online');
                        setMessage('');
                    }).catch(() => setNeedsTap(true));
                    return;
                }

                setIsConnecting(false);
                setError('Este navegador no soporta HLS y no pudo cargar HLS.js.');
            };

            const handlePlay = (value = aceId, titleHint = '') => {
                const id = normalizeAceId(value);
                if (!id) {
                    setError('Pega un ID AceStream valido de 40 caracteres o un enlace acestream://.');
                    return;
                }
                const displayTitle = titleHint
                    || localLibrary.find(item => item.id === id)?.title
                    || remoteStreams.find(item => item.id === id)?.title
                    || `Stream ${id.substring(0, 8)}`;

                setAceId(id);
                setCurrentTitle(displayTitle);
                setError('');
                setActiveTabMobile('player');

                const recent = { title: displayTitle, id, type: 'recent', category: 'General', date: new Date().toISOString() };
                const nextLocal = [recent, ...localLibrary.filter(item => !(item.id === id && item.type === 'recent'))];
                setLocalLibrary(nextLocal);
                persistState(nextLocal);
                playHls(id);
            };

            const handleStop = () => {
                destroyPlayer();
                setIsPlaying(false);
                setIsConnecting(false);
                setNeedsTap(false);
                setShowNerdStats(false);
                setMessage('Reproduccion detenida.');
            };

            const resumePlayback = () => {
                const video = videoRef.current;
                if (!video) return;
                video.play().then(() => setNeedsTap(false)).catch(() => {});
            };

            const handleRestartEngine = async () => {
                setIsRestarting(true);
                handleStop();
                setEngineStatus('connecting');
                try {
                    const response = await fetch('/api/restart-engine', { method: 'POST' });
                    if (!response.ok) throw new Error('restart');
                    setMessage('Motor reiniciado. Esperando a AceStream...');
                    setTimeout(checkEngine, 2500);
                } catch {
                    setError('No se pudo reiniciar el motor AceStream.');
                    setEngineStatus('offline');
                } finally {
                    setIsRestarting(false);
                }
            };

            const handleSaveClick = () => {
                if (!aceId) return;
                const isAlreadyFav = localLibrary.some(item => item.id === aceId && item.type === 'fav');

                if (isAlreadyFav) {
                    const nextLocal = localLibrary.filter(item => !(item.id === aceId && item.type === 'fav'));
                    setLocalLibrary(nextLocal);
                    persistState(nextLocal);
                } else {
                    setCustomTitle(currentTitle || `Canal ${aceId.substring(0, 6)}`);
                    setSaveModalOpen(true);
                }
            };

            const confirmSaveFavorite = (e) => {
                e.preventDefault();
                const newFav = {
                    title: customTitle || `Canal ${aceId.substring(0, 6)}`,
                    id: aceId,
                    type: 'fav',
                    category: 'Guardado',
                    date: new Date().toISOString()
                };
                const nextLocal = [newFav, ...localLibrary.filter(item => !(item.id === aceId && item.type === 'fav'))];
                setLocalLibrary(nextLocal);
                persistState(nextLocal);
                setSaveModalOpen(false);
                setLibraryFilter('fav');
            };

            const confirmEditChannel = (e) => {
                e.preventDefault();
                if (actionItem?.type === 'web') {
                    const nextRemote = remoteStreams.map(item => item.id === actionItem.id ? { ...item, title: editTitle } : item);
                    setRemoteStreams(nextRemote);
                    persistState(localLibrary, nextRemote);
                } else {
                    const nextLocal = localLibrary.map(item =>
                        item.id === actionItem?.id && item.type === actionItem?.type
                            ? { ...item, title: editTitle }
                            : item
                    );
                    setLocalLibrary(nextLocal);
                    persistState(nextLocal);
                }
                setEditModalOpen(false);
                setTimeout(() => setActionItem(null), 300);
            };

            const deleteChannel = () => {
                if (actionItem?.type === 'web') {
                    const nextRemote = remoteStreams.filter(item => item.id !== actionItem.id);
                    setRemoteStreams(nextRemote);
                    persistState(localLibrary, nextRemote);
                } else {
                    const nextLocal = localLibrary.filter(item => !(item.id === actionItem?.id && item.type === actionItem?.type));
                    setLocalLibrary(nextLocal);
                    persistState(nextLocal);
                }
                setActionItem(null);
            };

            const syncWebDirectory = async (type = 'html') => {
                if (!syncUrl) return;
                setIsSyncing(true);
                setSyncError('');
                try {
                    const response = await fetch('/api/streams/sync', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: syncUrl, type })
                    });
                    const data = await response.json();
                    if (!response.ok || !data.success) throw new Error(data.error || 'sync');
                    setRemoteStreams(data.streams || []);
                    setLibraryFilter('web');
                } catch {
                    setSyncError('No se pudo importar esa URL. Comprueba que sea accesible y contenga enlaces acestream:// o un M3U valido.');
                } finally {
                    setIsSyncing(false);
                }
            };

            const fullLibrary = [...localLibrary, ...remoteStreams];
            const filteredLibrary = fullLibrary.filter(item => {
                if (libraryFilter === 'local') return item.type === 'recent';
                if (libraryFilter === 'fav') return item.type === 'fav';
                if (libraryFilter === 'web') return item.type === 'web';
                return true;
            });
            const isFavorite = localLibrary.some(item => item.id === aceId && item.type === 'fav');

            const LibraryGrid = ({ mobile = false }) => (
                <div className={mobile ? "grid grid-cols-1 sm:grid-cols-2 gap-3" : "grid grid-cols-1 gap-2"}>
                    {filteredLibrary.map((item, idx) => (
                        <ContentCard
                            key={`${mobile ? 'mob-' : ''}${item.type}-${item.id}-${idx}`}
                            {...item}
                            onClick={() => handlePlay(item.id, item.title)}
                            onOptionsClick={() => setActionItem(item)}
                        />
                    ))}
                    {filteredLibrary.length === 0 && (
                        <div className={mobile ? "text-center py-12 text-gray-500 text-sm col-span-full" : "text-center py-8 text-gray-500 text-sm flex flex-col items-center gap-3"}>
                            <i data-lucide="ghost" className={mobile ? "w-12 h-12 opacity-20 mx-auto mb-3" : "w-8 h-8 opacity-20"}></i>
                            <p>{mobile ? 'Lista vacia' : 'No hay canales en esta seccion'}</p>
                        </div>
                    )}
                </div>
            );

            const WebSyncPanel = ({ mobile = false }) => (
                <div className={`bg-brand-500/10 border border-brand-500/20 rounded-2xl p-4 ${mobile ? 'mb-2' : 'mb-2 relative overflow-hidden'}`}>
                    {!mobile && <div className="absolute inset-0 bg-gradient-to-br from-brand-500/5 to-transparent pointer-events-none"></div>}
                    {!mobile && isSyncing && <div className="absolute inset-0 bg-brand-500/20 animate-pulse pointer-events-none"></div>}

                    <h3 className={`text-sm font-semibold text-brand-400 mb-3 flex items-center gap-2 ${mobile ? '' : 'relative z-10'}`}>
                        <i data-lucide="globe" className="w-4 h-4"></i> Directorio Remoto
                    </h3>

                    <input
                        type="text"
                        value={syncUrl}
                        onChange={(e) => setSyncUrl(e.target.value)}
                        className={`w-full bg-background/50 border border-brand-500/20 text-white text-xs rounded-lg outline-none focus:border-brand-500 font-mono mb-3 ${mobile ? 'p-3' : 'p-2 relative z-10'}`}
                        placeholder="URL de web o archivo .m3u/.m3u8"
                    />

                    <div className={mobile ? "flex flex-col gap-2" : "flex gap-2 relative z-10"}>
                        <button
                            onClick={() => syncWebDirectory('html')}
                            disabled={isSyncing || !syncUrl}
                            className={`bg-brand-500 hover:bg-brand-600 disabled:opacity-50 text-white font-medium rounded-lg transition-all active:scale-95 flex justify-center items-center gap-2 shadow-lg shadow-brand-500/20 ${mobile ? 'w-full text-sm py-3 rounded-xl' : 'flex-1 text-xs py-2'}`}
                        >
                            {isSyncing ? <i data-lucide="loader-2" className="w-3.5 h-3.5 animate-spin"></i> : <i data-lucide="search" className="w-3.5 h-3.5"></i>}
                            Scraping HTML
                        </button>
                        <button
                            onClick={() => syncWebDirectory('m3u')}
                            disabled={isSyncing || !syncUrl}
                            className={`bg-surface hover:bg-surfaceHover border border-border disabled:opacity-50 text-white font-medium rounded-lg transition-all active:scale-95 flex justify-center items-center gap-2 ${mobile ? 'w-full text-sm py-3 rounded-xl' : 'flex-1 text-xs py-2'}`}
                        >
                            <i data-lucide="file-text" className="w-3.5 h-3.5"></i>
                            Importar M3U
                        </button>
                    </div>
                    {syncError && <p className="mt-2 text-xs text-red-400 relative z-10">{syncError}</p>}
                    {!syncError && remoteStreams.length > 0 && libraryFilter === 'web' && (
                        <p className="mt-2 text-xs text-gray-500 relative z-10">{remoteStreams.length} canales importados. Vuelve a sincronizar cuando la pagina se actualice.</p>
                    )}
                </div>
            );

            return (
                <div className="flex h-[100dvh] w-full overflow-hidden bg-background relative">

                    {/* MODALES ABSOLUTOS */}

                    {/* 1. Modal Ajustes */}
                    <div className={`fixed inset-0 z-[120] flex items-center justify-center px-4 bg-black/60 backdrop-blur-sm transition-all duration-300 ${showSettingsModal ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
                        <div className={`bg-surface border border-border w-full max-w-md rounded-2xl shadow-2xl transform transition-all duration-300 ${showSettingsModal ? 'scale-100 translate-y-0' : 'scale-95 translate-y-8'}`}>
                            <div className="p-4 border-b border-border flex justify-between items-center bg-white/5 rounded-t-2xl">
                                <h3 className="font-semibold text-white flex items-center gap-2">
                                    <i data-lucide="settings" className="w-5 h-5 text-gray-400"></i> Ajustes AceStream
                                </h3>
                                <button onClick={() => setShowSettingsModal(false)} className="p-1.5 text-gray-400 hover:text-white rounded-lg hover:bg-white/10 transition-colors">
                                    <i data-lucide="x" className="w-5 h-5"></i>
                                </button>
                            </div>
                            <div className="p-5 flex flex-col gap-4 text-sm text-gray-300">
                                <div>
                                    <label className="text-xs text-gray-500 mb-1 block">Puerto interno del motor (Umbrel)</label>
                                    <input type="text" value="6878" readOnly className="w-full bg-background border border-border text-gray-400 rounded-lg p-2.5 outline-none font-mono" />
                                </div>
                                <div className="pt-2 border-t border-border mt-2">
                                    <button onClick={handleRestartEngine} className="w-full bg-surfaceHover hover:bg-white/10 text-white font-medium py-2.5 rounded-lg transition-all flex justify-center items-center gap-2 border border-border">
                                        <i data-lucide="refresh-cw" className={`w-4 h-4 ${isRestarting ? 'animate-spin text-brand-400' : ''}`}></i>
                                        Forzar Reinicio del Motor
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 2. Modal Guardar Favorito */}
                    <div className={`fixed inset-0 z-[110] flex items-center justify-center px-4 bg-black/60 backdrop-blur-sm transition-all duration-300 ${saveModalOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
                        <div className={`bg-surface border border-border w-full max-w-sm rounded-2xl shadow-2xl transform transition-all duration-300 ${saveModalOpen ? 'scale-100 translate-y-0' : 'scale-95 translate-y-8'}`}>
                            <div className="p-4 border-b border-border flex justify-between items-center bg-white/5 rounded-t-2xl">
                                <h3 className="font-semibold text-white flex items-center gap-2">
                                    <i data-lucide="star" className="w-5 h-5 text-yellow-400 fill-yellow-400/20"></i> Anadir a Favoritos
                                </h3>
                                <button onClick={() => setSaveModalOpen(false)} className="p-1.5 text-gray-400 hover:text-white rounded-lg hover:bg-white/10 transition-colors">
                                    <i data-lucide="x" className="w-5 h-5"></i>
                                </button>
                            </div>
                            <form onSubmit={confirmSaveFavorite} className="p-5 flex flex-col gap-4">
                                <div>
                                    <label className="text-xs text-gray-400 mb-1 block">Titulo personalizado</label>
                                    <input
                                        autoFocus
                                        type="text"
                                        value={customTitle}
                                        onChange={(e) => setCustomTitle(e.target.value)}
                                        className="w-full bg-background border border-border text-white text-sm rounded-xl focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 p-3 outline-none"
                                        placeholder="Ej: Movistar Deportes"
                                    />
                                </div>
                                <div className="text-xs text-gray-500 font-mono break-all bg-black/30 p-2 rounded-lg border border-white/5">
                                    ID: {aceId}
                                </div>
                                <button type="submit" className="w-full bg-brand-500 hover:bg-brand-600 text-white font-medium py-3 rounded-xl transition-all active:scale-95 flex justify-center items-center gap-2">
                                    <i data-lucide="check" className="w-4 h-4"></i> Guardar
                                </button>
                            </form>
                        </div>
                    </div>

                    {/* 3. Modal Editar Canal */}
                    <div className={`fixed inset-0 z-[120] flex items-center justify-center px-4 bg-black/60 backdrop-blur-sm transition-all duration-300 ${editModalOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
                        <div className={`bg-surface border border-border w-full max-w-sm rounded-2xl shadow-2xl transform transition-all duration-300 ${editModalOpen ? 'scale-100 translate-y-0' : 'scale-95 translate-y-8'}`}>
                            <div className="p-4 border-b border-border flex justify-between items-center bg-white/5 rounded-t-2xl">
                                <h3 className="font-semibold text-white flex items-center gap-2">
                                    <i data-lucide="edit-2" className="w-5 h-5 text-gray-400"></i> Editar Canal
                                </h3>
                                <button onClick={() => { setEditModalOpen(false); setTimeout(() => setActionItem(null), 300); }} className="p-1.5 text-gray-400 hover:text-white rounded-lg hover:bg-white/10 transition-colors">
                                    <i data-lucide="x" className="w-5 h-5"></i>
                                </button>
                            </div>
                            <form onSubmit={confirmEditChannel} className="p-5 flex flex-col gap-4">
                                <div>
                                    <label className="text-xs text-gray-400 mb-1 block">Nuevo titulo</label>
                                    <input
                                        autoFocus
                                        type="text"
                                        value={editTitle}
                                        onChange={(e) => setEditTitle(e.target.value)}
                                        className="w-full bg-background border border-border text-white text-sm rounded-xl focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 p-3 outline-none"
                                    />
                                </div>
                                <button type="submit" className="w-full bg-brand-500 hover:bg-brand-600 text-white font-medium py-3 rounded-xl transition-all active:scale-95 flex justify-center items-center gap-2">
                                    <i data-lucide="check" className="w-4 h-4"></i> Guardar Cambios
                                </button>
                            </form>
                        </div>
                    </div>

                    {/* 4. Action Sheet (3 Puntitos) */}
                    <div className={`fixed inset-0 z-[110] flex items-end md:items-center justify-center px-4 pb-4 md:pb-0 bg-black/60 backdrop-blur-sm transition-all duration-300 ${actionItem ? 'opacity-100' : 'opacity-0 pointer-events-none'}`} onClick={() => setActionItem(null)}>
                        <div className={`bg-surface border border-border w-full max-w-sm rounded-2xl shadow-2xl transform transition-all duration-300 ${actionItem ? 'scale-100 translate-y-0' : 'scale-95 translate-y-8'}`} onClick={e => e.stopPropagation()}>
                            <div className="p-4 border-b border-border flex flex-col gap-1 bg-white/5 rounded-t-2xl">
                                <h3 className="font-medium text-white truncate pr-4">{actionItem?.title}</h3>
                                <p className="text-xs text-gray-500 font-mono truncate">{actionItem?.id}</p>
                            </div>
                            <div className="p-2 flex flex-col gap-1">
                                <button onClick={() => { handlePlay(actionItem.id, actionItem.title); setActionItem(null); }} className="flex items-center gap-3 w-full p-3 hover:bg-white/5 rounded-xl text-left text-white transition-colors active:scale-95">
                                    <i data-lucide="play" className="w-5 h-5 text-brand-400"></i> Reproducir ahora
                                </button>
                                <button onClick={() => { setEditTitle(actionItem.title); setEditModalOpen(true); }} className="flex items-center gap-3 w-full p-3 hover:bg-white/5 rounded-xl text-left text-white transition-colors active:scale-95">
                                    <i data-lucide="edit-2" className="w-5 h-5 text-gray-400"></i> Editar titulo
                                </button>
                                <div className="h-px bg-border my-1 mx-2"></div>
                                <button onClick={deleteChannel} className="flex items-center gap-3 w-full p-3 hover:bg-red-500/10 rounded-xl text-left text-red-500 transition-colors active:scale-95">
                                    <i data-lucide="trash-2" className="w-5 h-5"></i> Eliminar de la lista
                                </button>
                            </div>
                        </div>
                    </div>


                    {/* --- SIDEBAR (Solo Desktop) --- */}
                    <aside className="w-[300px] lg:w-[340px] bg-surface/50 border-r border-border hidden md:flex flex-col shrink-0 z-10">
                        <div className="h-20 flex items-center justify-between px-6 border-b border-border shrink-0">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-gradient-to-br from-brand-400 to-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-brand-500/20">
                                    <i data-lucide="play" className="w-5 h-5 text-white fill-white ml-0.5"></i>
                                </div>
                                <div>
                                    <h1 className="font-bold text-lg leading-tight tracking-tight text-white">AceNeo</h1>
                                    <p className="text-[10px] text-brand-400 uppercase tracking-widest font-semibold">Umbrel App</p>
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-4">
                            <div className="flex bg-background rounded-xl p-1 border border-border">
                                {['fav', 'local', 'web'].map(filter => (
                                    <button
                                        key={filter}
                                        onClick={() => setLibraryFilter(filter)}
                                        className={`flex-1 text-xs font-medium py-2 rounded-lg transition-all ${libraryFilter === filter ? 'bg-surface text-white shadow-sm border border-border' : 'text-gray-500 hover:text-gray-300'}`}
                                    >
                                        {filter === 'fav' ? 'Favs' : filter === 'local' ? 'Recientes' : 'Web'}
                                    </button>
                                ))}
                            </div>

                            {libraryFilter === 'web' && <WebSyncPanel />}

                            <LibraryGrid />
                        </div>

                        <div className="p-5 border-t border-border bg-surface/30 shrink-0">
                            <div className="flex justify-between items-center mb-1">
                                <span className="text-xs font-semibold text-gray-500 uppercase tracking-wider">Ace Engine</span>
                                <EngineStatus status={engineStatus} onRestart={handleRestartEngine} isRestarting={isRestarting} />
                            </div>
                        </div>
                    </aside>


                    {/* --- MAIN CONTENT --- */}
                    <main className="flex-1 flex flex-col min-w-0 relative z-0">
                        <header className="h-16 md:h-20 flex items-center justify-between px-4 md:px-8 border-b border-border/50 shrink-0 bg-background/80 backdrop-blur-md z-20">
                            <div className="flex md:hidden items-center gap-2.5">
                                <div className="w-8 h-8 bg-gradient-to-br from-brand-400 to-blue-600 rounded-lg flex items-center justify-center">
                                    <i data-lucide="play" className="w-4 h-4 text-white fill-white ml-0.5"></i>
                                </div>
                                <h1 className="font-bold text-white tracking-tight">AceNeo</h1>
                            </div>
                            <div className="hidden md:flex items-center text-sm font-medium text-gray-400">
                                {isPlaying ? (
                                    <span className="flex items-center gap-2"><i data-lucide="radio" className="w-4 h-4 text-brand-500 animate-pulse"></i> Reproduciendo {currentTitle}</span>
                                ) : (
                                    <span>Sistema listo para transmision</span>
                                )}
                            </div>
                            <div className="flex items-center gap-2">
                                <div className="md:hidden">
                                    <EngineStatus status={engineStatus} onRestart={handleRestartEngine} isRestarting={isRestarting} />
                                </div>
                                <IconButton icon="settings" onClick={() => setShowSettingsModal(true)} className="hidden md:flex" />
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-4 md:p-8 relative">
                            <div className="max-w-[1200px] mx-auto h-full flex flex-col">

                                {/* VISTA DE REPRODUCTOR */}
                                <div className={`md:block h-full ${activeTabMobile === 'player' ? 'block' : 'hidden md:block'}`}>
                                    <div className="flex flex-col gap-4 md:gap-6 h-full animate-fade-in">
                                        <div className="relative w-full aspect-video md:aspect-[21/9] lg:aspect-[16/9] bg-black rounded-2xl md:rounded-3xl overflow-hidden shadow-2xl border border-white/5 ring-1 ring-white/10 group">
                                            <video ref={videoRef} className="absolute inset-0 w-full h-full bg-black" playsInline controls />

                                            {isPlaying && !isConnecting && !error && (
                                                <div className="absolute top-4 right-4 flex items-center gap-3 pointer-events-none">
                                                    <button onClick={() => setShowNerdStats(!showNerdStats)} className="glass-panel p-2 rounded-full hover:bg-white/10 transition-colors text-white active:scale-95 pointer-events-auto">
                                                        <i data-lucide="bar-chart-2" className="w-4 h-4"></i>
                                                    </button>
                                                </div>
                                            )}

                                            {showNerdStats && isPlaying && (
                                                <div className="absolute top-16 right-4 glass-panel p-4 rounded-xl w-64 text-xs font-mono text-gray-300 shadow-2xl animate-fade-in z-20 border-white/10">
                                                    <h4 className="text-white font-sans font-medium mb-3 border-b border-white/10 pb-2">Motor AceStream</h4>
                                                    <div className="flex justify-between mb-2"><span>Estado:</span><span className="text-emerald-400 capitalize">{engineStatus}</span></div>
                                                    <div className="mt-3 pt-2 border-t border-white/10 truncate text-[10px] text-gray-500">{aceId}</div>
                                                    <p className="mt-2 text-[10px] text-gray-500">Estadisticas de red por stream: proximamente.</p>
                                                </div>
                                            )}

                                            {isPlaying && needsTap && !isConnecting && !error && (
                                                <button
                                                    onClick={resumePlayback}
                                                    className="absolute inset-0 flex flex-col items-center justify-center gap-3 bg-black/60 text-white z-10"
                                                >
                                                    <div className="w-16 h-16 rounded-full bg-brand-500 flex items-center justify-center shadow-lg">
                                                        <i data-lucide="play" className="w-7 h-7 fill-current ml-1"></i>
                                                    </div>
                                                    <p className="text-sm font-medium">Toca para reproducir</p>
                                                </button>
                                            )}

                                            {(!isPlaying || isConnecting || error) && (
                                                <div className="absolute inset-0 bg-surface/70 flex flex-col items-center justify-center relative overflow-hidden pointer-events-none">
                                                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[150%] h-[150%] bg-brand-500/5 blur-[120px] rounded-full"></div>
                                                    {isConnecting ? (
                                                        <div className="relative z-10 flex flex-col items-center gap-4 px-6 text-center">
                                                            <div className="relative">
                                                                <div className="absolute inset-0 border-4 border-brand-500/30 rounded-full animate-ping"></div>
                                                                <i data-lucide="loader-2" className="w-12 h-12 text-brand-500 animate-spin relative z-10"></i>
                                                            </div>
                                                            <p className="text-brand-400 font-medium animate-pulse">{message || 'Iniciando motor AceStream...'}</p>
                                                        </div>
                                                    ) : error ? (
                                                        <div className="relative z-10 flex flex-col items-center text-center gap-4 px-6">
                                                            <div className="w-20 h-20 rounded-full bg-surface border border-red-500/30 flex items-center justify-center shadow-lg">
                                                                <i data-lucide="triangle-alert" className="w-10 h-10 text-red-400"></i>
                                                            </div>
                                                            <p className="text-sm text-red-300 max-w-sm">{error}</p>
                                                        </div>
                                                    ) : (
                                                        <div className="relative z-10 flex flex-col items-center text-gray-500 gap-4 px-6 text-center">
                                                            <div className="w-20 h-20 rounded-full bg-surface border border-border flex items-center justify-center shadow-lg">
                                                                <i data-lucide="radio" className="w-10 h-10 opacity-50"></i>
                                                            </div>
                                                            <p className="text-sm">{message || 'Introduce un ID para comenzar a transmitir'}</p>
                                                        </div>
                                                    )}
                                                    {aceId && !isPlaying && <p className="mt-3 max-w-lg text-[11px] text-gray-500 font-mono break-all relative z-10">{aceId}</p>}
                                                </div>
                                            )}
                                        </div>

                                        {/* Input Box */}
                                        <div className="bg-surface border border-border rounded-2xl md:rounded-3xl p-4 md:p-6 shadow-xl relative overflow-hidden">
                                            <div className="absolute top-0 right-0 w-64 h-64 bg-brand-500/5 blur-[80px] rounded-full pointer-events-none"></div>
                                            <div className="relative z-10 flex flex-col md:flex-row gap-4">
                                                <div className="flex-1 relative group">
                                                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                                        <i data-lucide="hash" className="w-5 h-5 text-gray-500 group-focus-within:text-brand-400 transition-colors"></i>
                                                    </div>
                                                    <input
                                                        type="text"
                                                        value={aceId}
                                                        onChange={(e) => setAceId(e.target.value)}
                                                        onKeyDown={(e) => { if (e.key === 'Enter') handlePlay(aceId); }}
                                                        className="w-full bg-background border border-border text-gray-100 text-sm md:text-base rounded-xl focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 block w-full pl-11 pr-4 py-3.5 transition-all outline-none font-mono placeholder:font-sans placeholder:text-gray-600"
                                                        placeholder="Pegar Content ID, acestream://... o URL con ?id=..."
                                                    />
                                                    {aceId && (
                                                        <button onClick={() => setAceId('')} className="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-500 hover:text-white">
                                                            <i data-lucide="x" className="w-4 h-4"></i>
                                                        </button>
                                                    )}
                                                </div>
                                                <div className="flex items-center gap-2 md:gap-3">
                                                    {isPlaying ? (
                                                        <>
                                                            <button onClick={handleStop} className="flex-1 md:flex-none flex items-center justify-center gap-2 bg-red-500/10 hover:bg-red-500/20 text-red-500 border border-red-500/20 px-6 py-3.5 rounded-xl font-medium transition-all active:scale-95">
                                                                <i data-lucide="square" className="w-4 h-4 fill-current"></i> Parar
                                                            </button>
                                                            <div className="flex items-center gap-2 border-l border-border pl-3 ml-1">
                                                                <IconButton
                                                                    icon="star"
                                                                    onClick={handleSaveClick}
                                                                    className={isFavorite ? "text-yellow-400 hover:text-yellow-300" : "text-gray-400 hover:text-white"}
                                                                    title="Anadir a favoritos"
                                                                />
                                                            </div>
                                                        </>
                                                    ) : (
                                                        <button
                                                            onClick={() => handlePlay(aceId)}
                                                            disabled={!aceId || isConnecting}
                                                            className="flex-1 md:flex-none flex items-center justify-center gap-2 bg-brand-500 hover:bg-brand-600 disabled:opacity-50 disabled:hover:bg-brand-500 text-white px-8 py-3.5 rounded-xl font-medium shadow-lg shadow-brand-500/20 transition-all active:scale-95"
                                                        >
                                                            <i data-lucide="play" className="w-5 h-5 fill-current"></i>
                                                            <span>Reproducir</span>
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* VISTA MOVIL LIBRERIA (Reutilizada del sidebar) */}
                                <div className={`md:hidden h-full pb-24 overflow-y-auto ${activeTabMobile === 'library' ? 'block animate-fade-in' : 'hidden'}`}>
                                    <div className="flex flex-col gap-4">
                                        <div className="flex bg-background rounded-xl p-1 border border-border">
                                            {['fav', 'local', 'web'].map(filter => (
                                                <button
                                                    key={filter}
                                                    onClick={() => setLibraryFilter(filter)}
                                                    className={`flex-1 text-xs font-medium py-2.5 rounded-lg transition-all ${libraryFilter === filter ? 'bg-surface text-white shadow-sm border border-border' : 'text-gray-500'}`}
                                                >
                                                    {filter === 'fav' ? 'Favs' : filter === 'local' ? 'Recientes' : 'Web'}
                                                </button>
                                            ))}
                                        </div>

                                        {libraryFilter === 'web' && <WebSyncPanel mobile />}

                                        <LibraryGrid mobile />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* --- BOTTOM NAVIGATION (Solo Mobile) --- */}
                    <nav className="md:hidden fixed bottom-0 left-0 right-0 h-16 bg-surface/90 backdrop-blur-xl border-t border-border z-50 px-6 flex items-center justify-around pb-safe">
                        <button
                            onClick={() => setActiveTabMobile('player')}
                            className={`flex flex-col items-center justify-center w-16 h-full gap-1 transition-colors ${activeTabMobile === 'player' ? 'text-brand-400' : 'text-gray-500 hover:text-gray-300'}`}
                        >
                            <div className={`relative ${activeTabMobile === 'player' ? 'scale-110' : ''} transition-transform`}>
                                <i data-lucide="play-square" className="w-5 h-5"></i>
                                {isPlaying && activeTabMobile !== 'player' && (
                                    <span className="absolute -top-1 -right-1 w-2.5 h-2.5 bg-brand-500 rounded-full border-2 border-surface"></span>
                                )}
                            </div>
                            <span className="text-[10px] font-medium">Player</span>
                        </button>

                        <button
                            onClick={() => setActiveTabMobile('library')}
                            className={`flex flex-col items-center justify-center w-16 h-full gap-1 transition-colors ${activeTabMobile === 'library' ? 'text-brand-400' : 'text-gray-500 hover:text-gray-300'}`}
                        >
                            <i data-lucide="library" className={`w-5 h-5 ${activeTabMobile === 'library' ? 'scale-110' : ''} transition-transform`}></i>
                            <span className="text-[10px] font-medium">Libreria</span>
                        </button>

                        <button
                            onClick={() => setShowSettingsModal(true)}
                            className="flex flex-col items-center justify-center w-16 h-full gap-1 transition-colors text-gray-500 hover:text-gray-300"
                        >
                            <i data-lucide="settings" className="w-5 h-5"></i>
                            <span className="text-[10px] font-medium">Ajustes</span>
                        </button>
                    </nav>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AppNeo />);
    </script>
</body>
</html>
