<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ace Player Neo - Umbrel</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <link rel="apple-touch-icon" href="/icon.svg">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#09090b',
                        surface: '#18181b',
                        surfaceHover: '#27272a',
                        border: '#27272a',
                        brand: {
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-up': 'slideUp 0.4s ease-out',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'spin-fast': 'spin 0.5s linear infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.10/dist/hls.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #09090b;
            color: #fafafa;
            -webkit-tap-highlight-color: transparent;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
        .glass-panel {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const IconButton = ({ icon, onClick, active, variant = 'ghost', className = "", title, disabled }) => {
            const base = "p-2.5 rounded-xl flex items-center justify-center transition-all duration-200 active:scale-95 disabled:opacity-50 disabled:pointer-events-none";
            const variants = {
                ghost: `hover:bg-surfaceHover text-gray-400 hover:text-white ${active ? 'bg-surfaceHover text-brand-400' : ''}`,
                primary: "bg-brand-500 hover:bg-brand-600 text-white shadow-lg shadow-brand-500/25",
                danger: "bg-red-500/10 hover:bg-red-500/20 text-red-500",
                glass: "bg-white/5 hover:bg-white/10 backdrop-blur-md text-white border border-white/10"
            };
            return (
                <button className={`${base} ${variants[variant]} ${className}`} onClick={onClick} title={title} disabled={disabled}>
                    <i data-lucide={icon} className="w-5 h-5"></i>
                </button>
            );
        };

        const EngineStatus = ({ status, onRestart, isRestarting }) => {
            const isOnline = status === 'online';
            const isConnecting = status === 'connecting';
            
            return (
                <div className="flex items-center gap-2">
                    <div className={`flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-medium border ${
                        isOnline ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : 
                        isConnecting ? 'bg-amber-500/10 text-amber-400 border-amber-500/20' :
                        'bg-red-500/10 text-red-400 border-red-500/20'
                    }`}>
                        <span className="relative flex h-2 w-2">
                            {(isOnline || isConnecting) && <span className={`animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 ${isOnline ? 'bg-emerald-400' : 'bg-amber-400'}`}></span>}
                            <span className={`relative inline-flex rounded-full h-2 w-2 ${isOnline ? 'bg-emerald-500' : isConnecting ? 'bg-amber-500' : 'bg-red-500'}`}></span>
                        </span>
                        <span className="capitalize">{status}</span>
                    </div>
                    <button 
                        onClick={onRestart}
                        disabled={isRestarting}
                        className="p-1.5 rounded-full hover:bg-surfaceHover text-gray-400 hover:text-white transition-colors disabled:opacity-50"
                        title="Reiniciar Motor"
                    >
                        <i data-lucide="refresh-cw" className={`w-4 h-4 ${isRestarting ? 'animate-spin text-brand-400' : ''}`}></i>
                    </button>
                </div>
            );
        };

        const ContentCard = ({ title, id, type = 'recent', category, onClick, onOptionsClick }) => {
            const categoryColors = {
                'Deportes': 'bg-orange-500/10 text-orange-400 border-orange-500/20',
                'Cine': 'bg-purple-500/10 text-purple-400 border-purple-500/20',
                'General': 'bg-gray-500/10 text-gray-400 border-gray-500/20'
            };
            const catColor = categoryColors[category] || categoryColors['General'];

            return (
                <div 
                    onClick={onClick}
                    className="group relative overflow-hidden rounded-2xl bg-surface border border-border p-4 hover:border-brand-500/50 hover:shadow-[0_0_15px_rgba(14,165,233,0.15)] transition-all duration-300 cursor-pointer flex flex-col gap-3"
                >
                    <div className="flex justify-between items-start">
                        <div className="flex gap-2 items-center">
                            <div className={`p-2 rounded-lg ${type === 'fav' ? 'bg-yellow-500/10 text-yellow-500' : 'bg-brand-500/10 text-brand-400'}`}>
                                <i data-lucide={type === 'fav' ? 'star' : 'clock'} className={`w-4 h-4 ${type === 'fav' ? 'fill-yellow-500/20' : ''}`}></i>
                            </div>
                            {category && (
                                <span className={`text-[10px] uppercase font-bold tracking-wider px-2 py-1 rounded-md border ${catColor} flex items-center`}>
                                    {category}
                                </span>
                            )}
                        </div>
                        <button 
                            onClick={(e) => { e.stopPropagation(); onOptionsClick(); }}
                            className="opacity-0 group-hover:opacity-100 transition-opacity p-1.5 text-gray-400 hover:text-white hover:bg-white/10 rounded-lg relative z-10 active:scale-95"
                        >
                            <i data-lucide="more-vertical" className="w-5 h-5"></i>
                        </button>
                    </div>
                    <div>
                        <h4 className="font-medium text-gray-100 truncate pr-4">{title}</h4>
                        <p className="text-xs text-gray-500 font-mono truncate mt-1">{id.substring(0, 16)}...</p>
                    </div>
                </div>
            );
        };

        const AppNeo = () => {
            const HASH_RE = /^[a-fA-F0-9]{40}$/;
            const videoRef = useRef(null);
            const hlsRef = useRef(null);
            const [engineStatus, setEngineStatus] = useState('offline');
            const [aceId, setAceId] = useState('');
            const [isPlaying, setIsPlaying] = useState(false);
            const [isConnecting, setIsConnecting] = useState(false);
            const [message, setMessage] = useState('Pega un hash AceStream o un enlace acestream:// para empezar.');
            const [error, setError] = useState('');
            const [activeTabMobile, setActiveTabMobile] = useState('player');
            const [libraryFilter, setLibraryFilter] = useState('fav');
            const [localLibrary, setLocalLibrary] = useState([]);
            const [remoteStreams, setRemoteStreams] = useState([]);
            const [syncUrl, setSyncUrl] = useState('');
            const [isSyncing, setIsSyncing] = useState(false);
            const [syncError, setSyncError] = useState('');
            const [currentTitle, setCurrentTitle] = useState('');
            const [showSaveModal, setShowSaveModal] = useState(false);
            const [saveTitle, setSaveTitle] = useState('');
            const [isRestarting, setIsRestarting] = useState(false);

            useEffect(() => {
                lucide.createIcons();
            });

            useEffect(() => {
                loadState();
                checkEngine();
                return () => destroyPlayer();
            }, []);

            const normalizeAceId = (value) => {
                const raw = String(value || '').trim();
                const aceMatch = raw.match(/acestream:\/\/([a-fA-F0-9]{40})/);
                if (aceMatch) return aceMatch[1].toLowerCase();
                try {
                    const parsed = new URL(raw);
                    const urlId = parsed.searchParams.get('id') || parsed.searchParams.get('content_id');
                    if (urlId && HASH_RE.test(urlId)) return urlId.toLowerCase();
                } catch {}
                const hashMatch = raw.match(/[a-fA-F0-9]{40}/);
                return hashMatch ? hashMatch[0].toLowerCase() : '';
            };

            const statePayload = (local = localLibrary, web = remoteStreams) => ({
                favorites: local.filter(item => item.type === 'fav'),
                history: local.filter(item => item.type === 'recent'),
                web
            });

            const persistState = async (local = localLibrary, web = remoteStreams) => {
                try {
                    await fetch('/api/state', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(statePayload(local, web))
                    });
                } catch {
                    setError('No se pudo guardar la biblioteca.');
                }
            };

            const loadState = async () => {
                try {
                    const response = await fetch('/api/state', { cache: 'no-store' });
                    if (!response.ok) throw new Error('state');
                    const state = await response.json();
                    const favorites = (state.favorites || []).map(item => ({ ...item, type: 'fav' }));
                    const history = (state.history || []).map(item => ({ ...item, type: 'recent' }));
                    const web = (state.web || []).map(item => ({ ...item, type: 'web' }));
                    setLocalLibrary([...favorites, ...history]);
                    setRemoteStreams(web);
                } catch {
                    setError('Backend no disponible. Revisa que Ace Player Neo haya arrancado en Umbrel.');
                }
            };

            const checkEngine = async () => {
                try {
                    const response = await fetch('/api/engine/status', { cache: 'no-store' });
                    const data = await response.json();
                    setEngineStatus(data.online ? 'online' : 'offline');
                } catch {
                    setEngineStatus('offline');
                }
            };

            const destroyPlayer = () => {
                if (hlsRef.current) {
                    hlsRef.current.destroy();
                    hlsRef.current = null;
                }
                const video = videoRef.current;
                if (video) {
                    video.pause();
                    video.removeAttribute('src');
                    video.load();
                }
            };

            const playHls = (id) => {
                const video = videoRef.current;
                if (!video) return;
                destroyPlayer();
                const source = `/ace/manifest.m3u8?id=${id}&_=${Date.now()}`;
                setIsConnecting(true);
                setMessage('Conectando con AceStream...');

                if (window.Hls && Hls.isSupported()) {
                    const hls = new Hls({
                        liveSyncDurationCount: 3,
                        manifestLoadingTimeOut: 20000,
                        fragLoadingTimeOut: 20000,
                    });
                    hlsRef.current = hls;
                    hls.loadSource(source);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        setIsConnecting(false);
                        setIsPlaying(true);
                        setEngineStatus('online');
                        setMessage('');
                        video.play().catch(() => setMessage('Pulsa play en el video.'));
                    });
                    hls.on(Hls.Events.ERROR, (_, data) => {
                        if (!data.fatal) return;
                        if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                            hls.recoverMediaError();
                            return;
                        }
                        setIsConnecting(false);
                        setError('No se pudo cargar el stream. Comprueba el hash o espera a que AceStream encuentre pares.');
                        setMessage('');
                    });
                    return;
                }

                if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = source;
                    video.play().then(() => {
                        setIsConnecting(false);
                        setIsPlaying(true);
                        setEngineStatus('online');
                        setMessage('');
                    }).catch(() => setMessage('Pulsa play en el video.'));
                    return;
                }

                setIsConnecting(false);
                setError('Este navegador no soporta HLS y no pudo cargar HLS.js.');
            };

            const handlePlay = (value = aceId, title = '') => {
                const id = normalizeAceId(value);
                if (!id) {
                    setError('Pega un hash AceStream valido de 40 caracteres o un enlace acestream://.');
                    return;
                }
                const displayTitle = title || localLibrary.find(item => item.id === id)?.title || remoteStreams.find(item => item.id === id)?.title || `Stream ${id.substring(0, 8)}`;
                setAceId(id);
                setCurrentTitle(displayTitle);
                setError('');
                setActiveTabMobile('player');

                const favoriteCount = localLibrary.filter(item => item.type === 'fav').length;
                const recent = { title: displayTitle, id, type: 'recent', category: 'General', date: new Date().toISOString() };
                const nextLocal = localLibrary.filter(item => !(item.id === id && item.type === 'recent'));
                nextLocal.splice(favoriteCount, 0, recent);
                setLocalLibrary(nextLocal);
                persistState(nextLocal);
                playHls(id);
            };

            const handleStop = () => {
                destroyPlayer();
                setIsPlaying(false);
                setIsConnecting(false);
                setMessage('Reproduccion detenida.');
            };

            const handleRestartEngine = async () => {
                setIsRestarting(true);
                handleStop();
                setEngineStatus('offline');
                try {
                    const response = await fetch('/api/restart-engine', { method: 'POST' });
                    if (!response.ok) throw new Error('restart');
                    setMessage('Motor reiniciado. Esperando a AceStream...');
                    setTimeout(checkEngine, 2500);
                } catch {
                    setError('No se pudo reiniciar el motor AceStream.');
                } finally {
                    setIsRestarting(false);
                }
            };

            const toggleFavorite = () => {
                if (!aceId) return;
                const exists = localLibrary.some(item => item.id === aceId && item.type === 'fav');
                if (exists) {
                    const nextLocal = localLibrary.filter(item => !(item.id === aceId && item.type === 'fav'));
                    setLocalLibrary(nextLocal);
                    persistState(nextLocal);
                    return;
                }
                setSaveTitle(currentTitle || `Canal ${aceId.substring(0, 6)}`);
                setShowSaveModal(true);
            };

            const saveFavorite = (event) => {
                event.preventDefault();
                const favorite = { title: saveTitle || `Canal ${aceId.substring(0, 6)}`, id: aceId, type: 'fav', category: 'Guardado', date: new Date().toISOString() };
                const nextLocal = [favorite, ...localLibrary.filter(item => !(item.id === aceId && item.type === 'fav'))];
                setLocalLibrary(nextLocal);
                persistState(nextLocal);
                setShowSaveModal(false);
                setLibraryFilter('fav');
            };

            const deleteItem = (item) => {
                if (item.type === 'web') {
                    const nextRemote = remoteStreams.filter(stream => stream.id !== item.id);
                    setRemoteStreams(nextRemote);
                    persistState(localLibrary, nextRemote);
                    return;
                }
                const nextLocal = localLibrary.filter(stream => !(stream.id === item.id && stream.type === item.type));
                setLocalLibrary(nextLocal);
                persistState(nextLocal);
            };

            const syncWebDirectory = async (type = 'html') => {
                setIsSyncing(true);
                setSyncError('');
                try {
                    const response = await fetch('/api/streams/sync', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: syncUrl, type })
                    });
                    const data = await response.json();
                    if (!response.ok || !data.success) throw new Error(data.error || 'sync');
                    setRemoteStreams(data.streams || []);
                    setLibraryFilter('web');
                } catch {
                    setSyncError('No se pudo importar esa URL.');
                } finally {
                    setIsSyncing(false);
                }
            };

            const fullLibrary = [...localLibrary, ...remoteStreams];
            const filteredLibrary = fullLibrary.filter(item => {
                if (libraryFilter === 'local') return item.type === 'recent';
                if (libraryFilter === 'fav') return item.type === 'fav';
                if (libraryFilter === 'web') return item.type === 'web';
                return true;
            });
            const isFavorite = localLibrary.some(item => item.id === aceId && item.type === 'fav');

            const LibraryList = () => (
                <div className="grid grid-cols-1 gap-2">
                    {filteredLibrary.map(item => (
                        <div key={`${item.type}-${item.id}`} className="group rounded-2xl bg-surface border border-border p-4 hover:border-brand-500/50 transition-all flex items-center gap-3">
                            <button onClick={() => handlePlay(item.id, item.title)} className="min-w-0 flex-1 text-left">
                                <div className="flex items-center gap-2 mb-1">
                                    <span className={`p-1.5 rounded-lg ${item.type === 'fav' ? 'bg-yellow-500/10 text-yellow-400' : item.type === 'web' ? 'bg-brand-500/10 text-brand-400' : 'bg-white/5 text-gray-400'}`}>
                                        <i data-lucide={item.type === 'fav' ? 'star' : item.type === 'web' ? 'globe' : 'clock'} className="w-4 h-4"></i>
                                    </span>
                                    <span className="text-xs text-gray-500 uppercase font-bold">{item.category || 'General'}</span>
                                </div>
                                <h4 className="font-medium text-gray-100 truncate">{item.title}</h4>
                                <p className="text-xs text-gray-500 font-mono truncate mt-1">{item.id}</p>
                            </button>
                            <button onClick={() => deleteItem(item)} className="p-2 rounded-xl text-gray-500 hover:text-red-400 hover:bg-red-500/10 transition-colors" title="Eliminar">
                                <i data-lucide="trash-2" className="w-4 h-4"></i>
                            </button>
                        </div>
                    ))}
                    {filteredLibrary.length === 0 && (
                        <div className="text-center py-10 text-gray-500 text-sm border border-dashed border-border rounded-2xl">
                            <i data-lucide="folder-open" className="w-8 h-8 mx-auto mb-3 opacity-40"></i>
                            <p>No hay canales en esta seccion</p>
                        </div>
                    )}
                </div>
            );

            return (
                <div className="flex h-[100dvh] w-full overflow-hidden bg-background relative">
                    {showSaveModal && (
                        <div className="fixed inset-0 z-[120] flex items-center justify-center px-4 bg-black/60 backdrop-blur-sm">
                            <form onSubmit={saveFavorite} className="bg-surface border border-border w-full max-w-sm rounded-2xl shadow-2xl p-5 flex flex-col gap-4">
                                <h3 className="font-semibold text-white flex items-center gap-2">
                                    <i data-lucide="star" className="w-5 h-5 text-yellow-400"></i> Guardar favorito
                                </h3>
                                <input autoFocus value={saveTitle} onChange={(e) => setSaveTitle(e.target.value)} className="w-full bg-background border border-border text-white text-sm rounded-xl focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 p-3 outline-none" placeholder="Nombre del canal" />
                                <div className="text-xs text-gray-500 font-mono break-all bg-black/30 p-2 rounded-lg border border-white/5">ID: {aceId}</div>
                                <div className="grid grid-cols-2 gap-2">
                                    <button type="button" onClick={() => setShowSaveModal(false)} className="bg-surfaceHover hover:bg-white/10 text-white font-medium py-3 rounded-xl transition-all">Cancelar</button>
                                    <button type="submit" className="bg-brand-500 hover:bg-brand-600 text-white font-medium py-3 rounded-xl transition-all">Guardar</button>
                                </div>
                            </form>
                        </div>
                    )}

                    <aside className="w-[300px] lg:w-[340px] bg-surface/50 border-r border-border hidden md:flex flex-col shrink-0 z-10">
                        <div className="h-20 flex items-center justify-between px-6 border-b border-border shrink-0">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-gradient-to-br from-brand-400 to-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-brand-500/20">
                                    <i data-lucide="play" className="w-5 h-5 text-white fill-white ml-0.5"></i>
                                </div>
                                <div>
                                    <h1 className="font-bold text-lg leading-tight tracking-tight text-white">AceNeo</h1>
                                    <p className="text-[10px] text-brand-400 uppercase tracking-widest font-semibold">Umbrel App</p>
                                </div>
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-4">
                            <div className="flex bg-background rounded-xl p-1 border border-border">
                                {['fav', 'local', 'web'].map(filter => (
                                    <button key={filter} onClick={() => setLibraryFilter(filter)} className={`flex-1 text-xs font-medium py-2 rounded-lg transition-all ${libraryFilter === filter ? 'bg-surface text-white shadow-sm border border-border' : 'text-gray-500 hover:text-gray-300'}`}>
                                        {filter === 'fav' ? 'Favs' : filter === 'local' ? 'Recientes' : 'Web'}
                                    </button>
                                ))}
                            </div>
                            {libraryFilter === 'web' && (
                                <div className="bg-brand-500/10 border border-brand-500/20 rounded-2xl p-4">
                                    <h3 className="text-sm font-semibold text-brand-400 mb-3 flex items-center gap-2"><i data-lucide="globe" className="w-4 h-4"></i> Directorio remoto</h3>
                                    <input value={syncUrl} onChange={(e) => setSyncUrl(e.target.value)} className="w-full bg-background/50 border border-brand-500/20 text-white text-xs rounded-lg p-2 mb-3 outline-none focus:border-brand-500 font-mono" placeholder="URL de web o archivo .m3u" />
                                    <div className="flex gap-2">
                                        <button onClick={() => syncWebDirectory('html')} disabled={isSyncing || !syncUrl} className="flex-1 bg-brand-500 hover:bg-brand-600 disabled:opacity-50 text-white text-xs font-medium py-2 rounded-lg transition-all flex justify-center items-center gap-2">
                                            {isSyncing ? <i data-lucide="loader-2" className="w-3.5 h-3.5 animate-spin"></i> : <i data-lucide="search" className="w-3.5 h-3.5"></i>} HTML
                                        </button>
                                        <button onClick={() => syncWebDirectory('m3u')} disabled={isSyncing || !syncUrl} className="flex-1 bg-surface hover:bg-surfaceHover border border-border disabled:opacity-50 text-white text-xs font-medium py-2 rounded-lg transition-all flex justify-center items-center gap-2">
                                            <i data-lucide="file-text" className="w-3.5 h-3.5"></i> M3U
                                        </button>
                                    </div>
                                    {syncError && <p className="mt-2 text-xs text-red-400">{syncError}</p>}
                                </div>
                            )}
                            <LibraryList />
                        </div>
                        <div className="p-5 border-t border-border bg-surface/30 shrink-0">
                            <div className="flex justify-between items-center">
                                <span className="text-xs font-semibold text-gray-500 uppercase tracking-wider">Ace Engine</span>
                                <EngineStatus status={engineStatus} onRestart={handleRestartEngine} isRestarting={isRestarting} />
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col min-w-0 relative z-0">
                        <header className="h-16 md:h-20 flex items-center justify-between px-4 md:px-8 border-b border-border/50 shrink-0 bg-background/80 backdrop-blur-md z-20">
                            <div className="flex items-center gap-2.5">
                                <div className="w-8 h-8 bg-gradient-to-br from-brand-400 to-blue-600 rounded-lg flex items-center justify-center md:hidden">
                                    <i data-lucide="play" className="w-4 h-4 text-white fill-white ml-0.5"></i>
                                </div>
                                <div>
                                    <h1 className="font-bold text-white tracking-tight md:hidden">AceNeo</h1>
                                    <p className="hidden md:block text-sm font-medium text-gray-400">{isPlaying ? `Reproduciendo ${currentTitle}` : 'Sistema listo para transmision'}</p>
                                </div>
                            </div>
                            <div className="md:hidden">
                                <EngineStatus status={engineStatus} onRestart={handleRestartEngine} isRestarting={isRestarting} />
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-4 md:p-8">
                            <div className="max-w-[1200px] mx-auto h-full flex flex-col">
                                <div className={`md:block h-full ${activeTabMobile === 'player' ? 'block' : 'hidden md:block'}`}>
                                    <div className="flex flex-col gap-4 md:gap-6 h-full animate-fade-in">
                                        <div className="relative w-full aspect-video md:aspect-[21/9] lg:aspect-[16/9] bg-black rounded-2xl md:rounded-3xl overflow-hidden shadow-2xl border border-white/5 ring-1 ring-white/10 group">
                                            <video ref={videoRef} className="absolute inset-0 w-full h-full bg-black" playsInline controls />
                                            {(!isPlaying || isConnecting || message || error) && (
                                                <div className="absolute inset-0 bg-black/70 flex flex-col items-center justify-center text-center px-6">
                                                    {isConnecting ? <i data-lucide="loader-2" className="w-12 h-12 text-brand-500 animate-spin mb-4"></i> : <i data-lucide={error ? 'triangle-alert' : 'radio'} className={`w-12 h-12 mb-4 ${error ? 'text-red-400' : 'text-gray-500'}`}></i>}
                                                    <p className={`text-sm md:text-base font-medium ${error ? 'text-red-300' : 'text-gray-300'}`}>{error || message}</p>
                                                    {aceId && <p className="mt-3 max-w-lg text-[11px] text-gray-500 font-mono break-all">{aceId}</p>}
                                                </div>
                                            )}
                                        </div>

                                        <div className="bg-surface border border-border rounded-2xl md:rounded-3xl p-4 md:p-6 shadow-xl relative overflow-hidden">
                                            <div className="relative z-10 flex flex-col md:flex-row gap-4">
                                                <div className="flex-1 relative group">
                                                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                                        <i data-lucide="hash" className="w-5 h-5 text-gray-500 group-focus-within:text-brand-400 transition-colors"></i>
                                                    </div>
                                                    <input type="text" value={aceId} onChange={(e) => setAceId(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') handlePlay(aceId); }} className="w-full bg-background border border-border text-gray-100 text-sm md:text-base rounded-xl focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 block pl-11 pr-4 py-3.5 transition-all outline-none font-mono placeholder:font-sans placeholder:text-gray-600" placeholder="Pegar Content ID, acestream://... o URL con ?id=..." />
                                                </div>
                                                <div className="flex items-center gap-2 md:gap-3">
                                                    {isPlaying ? (
                                                        <>
                                                            <button onClick={handleStop} className="flex-1 md:flex-none flex items-center justify-center gap-2 bg-red-500/10 hover:bg-red-500/20 text-red-500 border border-red-500/20 px-6 py-3.5 rounded-xl font-medium transition-all active:scale-95">
                                                                <i data-lucide="square" className="w-4 h-4 fill-current"></i> Parar
                                                            </button>
                                                            <IconButton icon="star" onClick={toggleFavorite} className={isFavorite ? "text-yellow-400 hover:text-yellow-300" : "text-gray-400 hover:text-white"} title="Favorito" />
                                                        </>
                                                    ) : (
                                                        <button onClick={() => handlePlay(aceId)} disabled={!aceId || isConnecting} className="flex-1 md:flex-none flex items-center justify-center gap-2 bg-brand-500 hover:bg-brand-600 disabled:opacity-50 disabled:hover:bg-brand-500 text-white px-8 py-3.5 rounded-xl font-medium shadow-lg shadow-brand-500/20 transition-all active:scale-95">
                                                            <i data-lucide="play" className="w-5 h-5 fill-current"></i><span>Reproducir</span>
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                        </div>

                                        <div className={`md:hidden h-full pb-24 overflow-y-auto ${activeTabMobile === 'library' ? 'block animate-fade-in' : 'hidden'}`}>
                                            <div className="flex flex-col gap-4">
                                                <div className="flex bg-background rounded-xl p-1 border border-border">
                                                    {['fav', 'local', 'web'].map(filter => (
                                                        <button key={filter} onClick={() => setLibraryFilter(filter)} className={`flex-1 text-xs font-medium py-2.5 rounded-lg transition-all ${libraryFilter === filter ? 'bg-surface text-white shadow-sm border border-border' : 'text-gray-500'}`}>
                                                            {filter === 'fav' ? 'Favs' : filter === 'local' ? 'Recientes' : 'Web'}
                                                        </button>
                                                    ))}
                                                </div>
                                                {libraryFilter === 'web' && (
                                                    <div className="bg-brand-500/10 border border-brand-500/20 rounded-2xl p-4">
                                                        <input value={syncUrl} onChange={(e) => setSyncUrl(e.target.value)} className="w-full bg-background/50 border border-brand-500/20 text-white text-xs rounded-lg p-3 mb-3 outline-none focus:border-brand-500 font-mono" placeholder="URL de web o archivo .m3u" />
                                                        <div className="flex flex-col gap-2">
                                                            <button onClick={() => syncWebDirectory('html')} disabled={isSyncing || !syncUrl} className="w-full bg-brand-500 hover:bg-brand-600 disabled:opacity-50 text-white text-sm font-medium py-3 rounded-xl transition-all flex justify-center items-center gap-2">Scraping HTML</button>
                                                            <button onClick={() => syncWebDirectory('m3u')} disabled={isSyncing || !syncUrl} className="w-full bg-surface border border-border disabled:opacity-50 text-white text-sm font-medium py-3 rounded-xl transition-all flex justify-center items-center gap-2">Importar M3U</button>
                                                        </div>
                                                        {syncError && <p className="mt-2 text-xs text-red-400">{syncError}</p>}
                                                    </div>
                                                )}
                                                <LibraryList />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    <nav className="md:hidden fixed bottom-0 left-0 right-0 h-16 bg-surface/90 backdrop-blur-xl border-t border-border z-50 px-6 flex items-center justify-around">
                        <button onClick={() => setActiveTabMobile('player')} className={`flex flex-col items-center justify-center w-16 h-full gap-1 transition-colors ${activeTabMobile === 'player' ? 'text-brand-400' : 'text-gray-500 hover:text-gray-300'}`}>
                            <i data-lucide="play-square" className="w-5 h-5"></i><span className="text-[10px] font-medium">Player</span>
                        </button>
                        <button onClick={() => setActiveTabMobile('library')} className={`flex flex-col items-center justify-center w-16 h-full gap-1 transition-colors ${activeTabMobile === 'library' ? 'text-brand-400' : 'text-gray-500 hover:text-gray-300'}`}>
                            <i data-lucide="library" className="w-5 h-5"></i><span className="text-[10px] font-medium">Biblioteca</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AppNeo />);
    </script>
</body>
</html>
