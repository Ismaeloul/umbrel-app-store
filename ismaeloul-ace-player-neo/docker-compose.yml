version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: ismaeloul-ace-player-neo_nginx_1
      APP_PORT: "80"
      PROXY_AUTH_ADD: "true"

  acestream:
    image: wafy80/acestream@sha256:8ffbc03916d8e33d321430f9ca1731ef3b058e72eeb9d9f7b322e9f7de654edc
    container_name: ismaeloul-ace-player-neo_acestream_1
    restart: unless-stopped

  storage:
    image: node:20.19-alpine
    container_name: ismaeloul-ace-player-neo_storage_1
    restart: unless-stopped
    working_dir: /app
    command: node /app/server.js
    volumes:
      - ${APP_DATA_DIR}/server.js:/app/server.js:ro
      - ${APP_DATA_DIR}/data:/data
      - /var/run/docker.sock:/var/run/docker.sock

  nginx:
    image: nginx:1.27-alpine
    container_name: ismaeloul-ace-player-neo_nginx_1
    restart: unless-stopped
    depends_on:
      - acestream
      - storage
    volumes:
      - ${APP_DATA_DIR}/index.html:/usr/share/nginx/html/index.html:ro
      - ${APP_DATA_DIR}/icon.svg:/usr/share/nginx/html/icon.svg:ro
      - ${APP_DATA_DIR}/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    command: nginx -g 'daemon off;'
