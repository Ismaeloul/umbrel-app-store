version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: ismaeloul-ace-player-neo_nginx_1
      APP_PORT: "80"
      PROXY_AUTH_ADD: "true"

  acestream:
    image: wafy80/acestream@sha256:8ffbc03916d8e33d321430f9ca1731ef3b058e72eeb9d9f7b322e9f7de654edc
    container_name: ismaeloul-ace-player-neo_acestream_1
    restart: unless-stopped

  storage:
    image: node:20.19-alpine
    container_name: ismaeloul-ace-player-neo_storage_1
    restart: unless-stopped
    working_dir: /app
    command: |
      sh -c "
        wget -q -O /app/server.js 'https://raw.githubusercontent.com/Ismaeloul/umbrel-app-store/main/ismaeloul-ace-player-neo/server.js?v=0.2.0' &&
        node /app/server.js
      "
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - /var/run/docker.sock:/var/run/docker.sock

  nginx:
    image: nginx:1.27-alpine
    container_name: ismaeloul-ace-player-neo_nginx_1
    restart: unless-stopped
    depends_on:
      - acestream
      - storage
    command: |
      sh -c "
        wget -q -O /usr/share/nginx/html/index.html 'https://raw.githubusercontent.com/Ismaeloul/umbrel-app-store/main/ismaeloul-ace-player-neo/index.html?v=0.2.0' &&
        wget -q -O /usr/share/nginx/html/icon.svg 'https://raw.githubusercontent.com/Ismaeloul/umbrel-app-store/main/ismaeloul-ace-player-neo/icon.svg?v=0.2.0' &&
        printf '%s\n' 'server {' '  listen 80;' '  client_max_body_size 2m;' '  add_header X-Content-Type-Options nosniff always;' '  add_header Referrer-Policy same-origin always;' '  add_header X-Robots-Tag noindex always;' '  location / {' '    root /usr/share/nginx/html;' '    index index.html;' '    try_files $$uri $$uri/ /index.html;' '  }' '  location /api/ {' '    proxy_pass http://storage:3000/api/;' '    proxy_set_header Host $$http_host;' '  }' '  location /ace/ {' '    proxy_pass http://acestream:6878/ace/;' '    proxy_http_version 1.1;' '    proxy_set_header Host $$http_host;' '    proxy_set_header Connection "";' '    proxy_set_header Accept-Encoding "";' '    proxy_buffering off;' '    proxy_request_buffering off;' '    proxy_read_timeout 3600s;' '    proxy_send_timeout 3600s;' '    proxy_redirect ~^http://[^/]+/(ace|content)/(.*)$$ $$scheme://$$http_host/$$1/$$2;' '    sub_filter_types application/vnd.apple.mpegurl application/x-mpegURL audio/mpegurl text/plain;' '    sub_filter_once off;' '    sub_filter http://127.0.0.1:6878/ace/ /ace/;' '    sub_filter http://localhost:6878/ace/ /ace/;' '    sub_filter http://acestream:6878/ace/ /ace/;' '    sub_filter http://127.0.0.1:6878/content/ /content/;' '    sub_filter http://localhost:6878/content/ /content/;' '    sub_filter http://acestream:6878/content/ /content/;' '  }' '  location /content/ {' '    proxy_pass http://acestream:6878/content/;' '    proxy_http_version 1.1;' '    proxy_set_header Host $$http_host;' '    proxy_set_header Connection "";' '    proxy_buffering off;' '    proxy_request_buffering off;' '    proxy_read_timeout 3600s;' '    proxy_send_timeout 3600s;' '    proxy_redirect ~^http://[^/]+/content/(.*)$$ $$scheme://$$http_host/content/$$1;' '  }' '  location /webui/ {' '    proxy_pass http://acestream:6878/webui/;' '    proxy_set_header Host $$http_host;' '    proxy_redirect off;' '  }' '}' > /etc/nginx/conf.d/default.conf &&
        nginx -g 'daemon off;'
      "
