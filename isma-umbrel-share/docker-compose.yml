version: "3.8"

services:
  web:
    image: python:3.12-slim
    container_name: isma-umbrel-share_web_1
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "3005:3005"
    volumes:
      - ${APP_DATA_DIR}/data:/app/data
      - /home/umbrel/umbrel/home:/data:ro
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - PORT=3005
      - SERVE_ROOT=/data
      - HIDDEN_DIRS=.ssh,secrets,postgres,.git,.config,lost+found
      - APP_PASSWORD=${APP_PASSWORD:-umbrel}
    command: >
      bash -c "
        mkdir -p /tmp/static &&
        python3 -c \"
import urllib.request
urllib.request.urlretrieve('https://raw.githubusercontent.com/Ismaeloul/umbrel-share/main/server.py', '/tmp/server.py')
urllib.request.urlretrieve('https://raw.githubusercontent.com/Ismaeloul/umbrel-share/main/index.html', '/tmp/static/index.html')
\" &&
        python3 /tmp/server.py
      "
